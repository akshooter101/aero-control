<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeroOS | Spatial Interface V5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-deep: #020617; var(--glass-bg): rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08); --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3); --text-main: #f8fafc; --text-muted: #64748b;
        }
        body { background: radial-gradient(circle at top right, #0f172a, var(--bg-deep)); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        .control-hub { width: 90vw; margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        select { appearance: none; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 8px; font-size: 12px; outline: none; width: 120px; text-align: center; }
        .pill-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid transparent; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-sys { background: var(--text-main); color: var(--bg-deep); }
        .btn-sys.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
        .btn-voice { background: transparent; color: var(--text-muted); border-color: var(--glass-border); }
        .btn-voice.active { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent); margin-top: -6px; box-shadow: 0 0 10px var(--accent-glow); }

        /* --- THE 16:9 SPATIAL PAD --- */
        #trackingContainer { 
            position: relative; 
            width: 90vw; 
            max-width: 800px;
            /* Mathematically locks to Laptop Resolution Proportions */
            aspect-ratio: 16 / 9; 
            margin-top: 20px; 
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.0) 100%);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5); overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pad-grid { position: absolute; width: 100%; height: 100%; opacity: 0.15; background-image: radial-gradient(var(--text-muted) 1px, transparent 1px); background-size: 24px 24px; }
        #trackingContainer.clicking { border-color: var(--accent); box-shadow: inset 0 0 60px var(--accent-glow); }
        
        #airCursor { position: absolute; width: 28px; height: 28px; border: 2px solid var(--accent); border-radius: 50%; background: rgba(56, 189, 248, 0.1); backdrop-filter: blur(4px); transform: translate(-50%, -50%); pointer-events: none; transition: transform 0.15s; display: flex; justify-content: center; align-items: center; }
        #airCursor::after { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
        #airCursor.clicking { transform: translate(-50%, -50%) scale(0.6); background: var(--accent); }
        
        #statusText { margin-top: 15px; padding: 8px 16px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.5px; }
        video { display: none; }
    </style>
</head>
<body>

    <div class="control-hub">
        <div class="row">
            <div>
                <label>Target OS</label>
                <select id="modeSelector"><option value="laptop">Desktop Node</option><option value="mobile">Local Native</option></select>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="sysToggle" class="pill-btn btn-sys active">System On</button>
                <button id="voiceToggle" class="pill-btn btn-voice">Mic Off</button>
            </div>
        </div>
        <div>
            <label style="display: flex; justify-content: space-between;"><span>Pointer Speed</span><span id="sensReadout" style="color: var(--accent);">1.5x</span></label>
            <input type="range" id="sensSlider" min="10" max="30" value="15">
        </div>
    </div>

    <div id="trackingContainer"><div class="pad-grid"></div><div id="airCursor"></div></div>
    <video id="webcam" autoplay playsinline></video>
    <div id="statusText">Initializing Narzo-Grade NPU...</div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const NGROK_URL = "premorbidly-stomatous-gino.ngrok-free.dev";
        const socket = new WebSocket(`wss://${NGROK_URL}`);

        const airCursor = document.getElementById("airCursor");
        const trackingPad = document.getElementById("trackingContainer");
        const sensSlider = document.getElementById("sensSlider");
        const sensReadout = document.getElementById("sensReadout");
        const sysToggle = document.getElementById("sysToggle");
        const voiceToggle = document.getElementById("voiceToggle");
        const statusText = document.getElementById("statusText");
        const video = document.getElementById("webcam");

        let smoothX = 0.5, smoothY = 0.5;
        let prevTargetX = 0.5, prevTargetY = 0.5;
        const CLICK_THRESHOLD = 0.03; 

        // --- GESTURE TRACKING VARIABLES ---
        let prevWristY = 0;
        let gestureCooldown = 0;

        sensSlider.oninput = () => { sensReadout.innerText = (sensSlider.value / 10).toFixed(1) + "x"; };

        let isActive = true;
        sysToggle.onclick = () => { isActive = !isActive; sysToggle.innerText = isActive ? "System On" : "System Off"; sysToggle.classList.toggle("active", isActive); };

        let isVoiceActive = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRec) {
            recognition = new SpeechRec(); recognition.continuous = true;
            recognition.onresult = (e) => {
                if (!isVoiceActive) return;
                const cmd = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
                statusText.innerText = `Heard: "${cmd}"`;
                if (socket.readyState === WebSocket.OPEN) socket.send(`VOICE:${cmd}`);
            };
            recognition.onend = () => { if (isVoiceActive) recognition.start(); };
        }
        voiceToggle.onclick = () => {
            isVoiceActive = !isVoiceActive; voiceToggle.innerText = isVoiceActive ? "Mic Live" : "Mic Off"; voiceToggle.classList.toggle("active", isVoiceActive);
            if (isVoiceActive && recognition) recognition.start(); else if (recognition) recognition.stop();
        };

        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        const handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
            runningMode: "VIDEO", numHands: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;

        // FINGER STATE HELPER
        function isFingerUp(landmarks, tipObj, dipObj) { return landmarks[tipObj].y < landmarks[dipObj].y; }

        async function renderLoop() {
            if (isActive && video.readyState >= 2) {
                const results = await handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks[0]) {
                    const lm = results.landmarks[0];
                    const tip = lm[8], thumb = lm[4], wrist = lm[0];

                    // --- REALME NARZO GESTURE CLASSIFICATION ---
                    if (gestureCooldown > 0) gestureCooldown--;

                    const indexUp = isFingerUp(lm, 8, 6);
                    const middleUp = isFingerUp(lm, 12, 10);
                    const ringUp = isFingerUp(lm, 16, 14);
                    const pinkyUp = isFingerUp(lm, 20, 18);
                    
                    const openHand = indexUp && middleUp && ringUp && pinkyUp;
                    const threeFingers = indexUp && middleUp && ringUp && !pinkyUp;
                    
                    // Thumbs Up (Thumb high, others folded)
                    const thumbsUp = !indexUp && !middleUp && !ringUp && !pinkyUp && (lm[4].y < lm[3].y);

                    // Multi-finger Pinch (Recent Apps)
                    const avgTipToThumbDist = (
                        Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y) +
                        Math.hypot(lm[12].x - lm[4].x, lm[12].y - lm[4].y) +
                        Math.hypot(lm[16].x - lm[4].x, lm[16].y - lm[4].y)
                    ) / 3;

                    let triggeredGesture = null;

                    if (gestureCooldown === 0) {
                        const wristVelocity = wrist.y - prevWristY;
                        
                        // 1. Air Scroll (Open hand moving up/down rapidly)
                        if (openHand && Math.abs(wristVelocity) > 0.04) {
                            triggeredGesture = wristVelocity < 0 ? "SCROLL_UP" : "SCROLL_DOWN";
                            statusText.innerText = `GESTURE: ${triggeredGesture}`;
                        }
                        // 2. 3-Finger Screenshot
                        else if (threeFingers && !openHand) {
                            triggeredGesture = "SCREENSHOT";
                            statusText.innerText = `GESTURE: SCREENSHOT`;
                        }
                        // 3. 5-Finger Pinch (Recent Apps)
                        else if (avgTipToThumbDist < 0.04 && !openHand) {
                            triggeredGesture = "PINCH_5";
                            statusText.innerText = `GESTURE: TASK VIEW`;
                        }
                        // 4. Thumbs Up (Home Screen)
                        else if (thumbsUp) {
                            triggeredGesture = "THUMBS_UP";
                            statusText.innerText = `GESTURE: HOME SCREEN`;
                        }

                        if (triggeredGesture && socket.readyState === WebSocket.OPEN) {
                            socket.send(`GEST:${triggeredGesture}`);
                            gestureCooldown = 40; // Wait ~1.5 seconds before allowing another gesture
                        }
                    }
                    prevWristY = wrist.y;

                    // --- STANDARD CURSOR MATH ---
                    const rawX = 1 - tip.x, rawY = tip.y;
                    const sens = sensSlider.value / 10; 
                    const targetX = Math.max(0.02, Math.min(0.98, (rawX - 0.5) * sens + 0.5));
                    const targetY = Math.max(0.02, Math.min(0.98, (rawY - 0.5) * sens + 0.5));

                    const distanceMoved = Math.sqrt(Math.pow(targetX - prevTargetX, 2) + Math.pow(targetY - prevTargetY, 2));
                    let dynamicLerp = 0.15; 
                    if (distanceMoved < 0.002) dynamicLerp = 0.0; 
                    else if (distanceMoved > 0.05) dynamicLerp = 0.6; 
                    else dynamicLerp = 0.25; 

                    smoothX += (targetX - smoothX) * dynamicLerp;
                    smoothY += (targetY - smoothY) * dynamicLerp;
                    prevTargetX = targetX; prevTargetY = targetY;

                    airCursor.style.left = `${smoothX * 100}%`;
                    airCursor.style.top = `${smoothY * 100}%`;

                    const clickDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y);
                    if (clickDist < CLICK_THRESHOLD) {
                        trackingPad.classList.add("clicking"); airCursor.classList.add("clicking");
                    } else {
                        trackingPad.classList.remove("clicking"); airCursor.classList.remove("clicking");
                    }

                    if (socket.readyState === WebSocket.OPEN && document.getElementById("modeSelector").value === "laptop") {
                        socket.send(`${smoothX.toFixed(4)},${smoothY.toFixed(4)},${clickDist.toFixed(4)}`);
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }
        video.onloadeddata = renderLoop;
    </script>
</body>
</html>
