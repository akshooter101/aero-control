<script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    // 1. Connection Setup
    // Use the exact subdomain you created in PowerShell
    const TUNNEL_URL = "aero-control-ak.loca.lt"; 
    const socket = new WebSocket('wss://aero-control-ak.loca.lt');

    const status = document.getElementById("status");
    const video = document.getElementById("webcam");

    // 2. Initialize MediaPipe (The "Brain")
    const hasWebNN = 'ml' in navigator;
    status.innerText = hasWebNN ? "NPU Active: Low Latency Mode" : "Wasm Active: Software Mode";

    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
    const handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { 
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
            delegate: hasWebNN ? "WEBNN" : "GPU" 
        },
        runningMode: "VIDEO",
        numHands: 1
    });

    // 3. Start Camera
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: 640, height: 480 } 
    });
    video.srcObject = stream;

    // 4. The Prediction Loop
    async function predict() {
        const results = await handLandmarker.detectForVideo(video, performance.now());
        
        if (results.landmarks && results.landmarks[0] && socket.readyState === WebSocket.OPEN) {
            const landmarks = results.landmarks[0];
            const tip = landmarks[8];   // Index Finger Tip
            const thumb = landmarks[4]; // Thumb Tip

            // Calculate Euclidean Distance for clicking
            const distance = Math.sqrt(
                Math.pow(tip.x - thumb.x, 2) + 
                Math.pow(tip.y - thumb.y, 2)
            );

            // Send: "x, y, distance"
            socket.send(`${1 - tip.x},${tip.y},${distance.toFixed(4)}`); 
        }
        requestAnimationFrame(predict);
    }
    video.onloadeddata = predict;
</script>
