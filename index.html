<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroOS · V8 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070d1a;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --border-hi:rgba(255,255,255,0.16);
  --cyan:#22d3ee;
  --cyan-dim:rgba(34,211,238,0.2);
  --text:#fff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  overflow:hidden;
}

#app{
  max-width:420px;
  margin:auto;
  padding:10px;
}

/* VERTICAL PAD */
#mainArea{
  width:100%;
  height:70vh;
  border:1px solid var(--border);
  border-radius:18px;
  position:relative;
  overflow:hidden;
}

/* AIR PAD */
#airPad{
  position:absolute; inset:0;
}

#airCursor{
  width:24px;height:24px;
  border:2px solid var(--cyan);
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
}

/* TOUCH PAD */
#touchPad{
  position:absolute; inset:0;
  display:none;
}

/* TOUCHPAD BUTTONS */
#tpButtons{
  position:absolute;
  bottom:0;
  width:100%;
  height:60px;
  display:flex;
  border-top:1px solid var(--border-hi);
}
.tp-btn{
  flex:1;
  border-right:1px solid var(--border-hi);
}
.tp-btn:last-child{border-right:none;}
.tp-btn:active{background:var(--cyan-dim);}

/* CONTROLS */
#controls{
  display:flex;
  gap:8px;
  margin-top:10px;
}
button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

/* MODE */
#mode{
  display:flex;
  margin-bottom:8px;
}
.mode-btn{
  flex:1;
  padding:8px;
  border:none;
  background:#111;
}
.mode-btn.active{background:var(--cyan);color:#000;}
</style>
</head>

<body>

<div id="app">

<div id="mode">
  <button class="mode-btn active" onclick="setMode('air')" id="btnAir">AIR</button>
  <button class="mode-btn" onclick="setMode('pad')" id="btnPad">PAD</button>
</div>

<div id="mainArea">
  <div id="airPad">
    <div id="airCursor"></div>
  </div>

  <div id="touchPad">
    <div id="tpButtons">
      <div class="tp-btn left"></div>
      <div class="tp-btn right"></div>
    </div>
  </div>
</div>

<div id="controls">
  <button onclick="toggleFlash()">Light</button>
  <button onclick="switchCamera()">Camera</button>
</div>

</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

/* ================= CONFIG ================= */
const socket = new WebSocket("wss://YOUR_NGROK");

/* ================= BASIC ================= */
function wsSend(m){
  if(socket.readyState===1) socket.send(m);
}

/* ================= MODE ================= */
let mode="air";
function setMode(m){
  mode=m;
  document.getElementById("airPad").style.display=m==="air"?"block":"none";
  document.getElementById("touchPad").style.display=m==="pad"?"block":"none";
  btnAir.classList.toggle("active",m==="air");
  btnPad.classList.toggle("active",m==="pad");
}

/* ================= FLASH ================= */
let flash=false;
function toggleFlash(){
  flash=!flash;

  document.body.style.background=flash?"#fff":"#070d1a";

  document.documentElement.style.setProperty(
    '--border',
    flash?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.08)'
  );
}

/* ================= CAMERA ================= */
let back=false;
async function switchCamera(){
  back=!back;

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:back?"environment":"user"
    }
  });

  video.srcObject=stream;
}

/* ================= TOUCHPAD ================= */
let cx=0.5,cy=0.5;
let dragging=false,dragTimer=null,lastDist=0;

touchPad.addEventListener("touchstart",e=>{
  if(e.touches.length===1){
    dragTimer=setTimeout(()=>{
      dragging=true;
      wsSend("GEST:DRAG_START");
    },300);
  }
});

touchPad.addEventListener("touchmove",e=>{
  if(e.touches.length===1){
    const t=e.touches[0];
    cx+=t.movementX*0.002;
    cy+=t.movementY*0.002;
    wsSend(`${cx},${cy}`);
  }

  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.hypot(dx,dy);

    if(lastDist){
      if(d>lastDist+5) wsSend("GEST:ZOOM_IN");
      else if(d<lastDist-5) wsSend("GEST:ZOOM_OUT");
    }
    lastDist=d;
  }
});

touchPad.addEventListener("touchend",()=>{
  clearTimeout(dragTimer);
  if(dragging) wsSend("GEST:DRAG_END");
  dragging=false;
  lastDist=0;
});

/* BUTTONS */
document.querySelector(".left").onclick=()=>wsSend("GEST:CLICK");
document.querySelector(".right").onclick=()=>wsSend("GEST:RIGHT_CLICK");

/* ================= AIR TRACKING ================= */
let handLandmarker,video=document.getElementById("video");
let cursorX=0.5,cursorY=0.5;

class Filter{
  constructor(){this.v=null;}
  f(n){this.v=this.v==null?n:this.v+(n-this.v)*0.2;return this.v;}
}
const fx=new Filter(),fy=new Filter();

async function init(){
  const vision=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
  );

  handLandmarker=await HandLandmarker.createFromOptions(vision,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode:"VIDEO",
    numHands:1
  });

  switchCamera();
  loop();
}

async function loop(){
  if(mode==="air" && video.readyState>=2){
    const res=await handLandmarker.detectForVideo(video,performance.now());

    if(res.landmarks?.[0]){
      const tip=res.landmarks[0][8];

      cursorX=fx.f(1-tip.x);
      cursorY=fy.f(tip.y);

      airCursor.style.left=(cursorX*100)+"%";
      airCursor.style.top=(cursorY*100)+"%";

      wsSend(`${cursorX},${cursorY}`);
    }
  }
  requestAnimationFrame(loop);
}

init();
</script>

</body>
</html>
