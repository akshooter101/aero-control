<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeroOS | Illumination Core V6.4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-deep: #020617; var(--glass-bg): rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08); --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3); --text-main: #f8fafc; --text-muted: #64748b;
        }
        
        /* Default Dark Theme */
        body { background: radial-gradient(circle at top right, #0f172a, var(--bg-deep)); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: background 0.3s; }
        
        /* --- THE SCREEN FLASH MODE --- */
        body.flash-mode { background: #ffffff; }
        /* Keep the Hub dark and readable even when the screen is blasting white */
        body.flash-mode .control-hub { background: rgba(10, 15, 30, 0.9); border: 1px solid rgba(0,0,0,0.5); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        /* Keep the Pad dark so the cursor remains high-contrast */
        body.flash-mode #trackingContainer { background: #020617; border-color: rgba(255,255,255,0.2); }

        #trackingContainer { 
            position: relative; width: 92vw; max-width: 800px; aspect-ratio: 16 / 9; 
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.0) 100%);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5); overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
        }
        .pad-grid { position: absolute; width: 100%; height: 100%; opacity: 0.15; background-image: radial-gradient(var(--text-muted) 1px, transparent 1px); background-size: 24px 24px; }
        #trackingContainer.clicking { border-color: var(--accent); box-shadow: inset 0 0 60px var(--accent-glow); background: rgba(56, 189, 248, 0.1); }
        #trackingContainer.double-clicking { border-color: #fff; box-shadow: inset 0 0 80px #fff; background: rgba(255, 255, 255, 0.2); }
        
        #airCursor { position: absolute; width: 32px; height: 32px; border: 2px solid var(--accent); border-radius: 50%; background: rgba(56, 189, 248, 0.1); backdrop-filter: blur(4px); transform: translate(-50%, -50%); pointer-events: none; display: flex; justify-content: center; align-items: center; transition: border-color 0.2s; }
        #airCursor::after { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }

        .control-hub { width: 92vw; max-width: 800px; padding: 15px 20px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); transition: background 0.3s; }
        .row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        
        .pill-btn { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; }
        .btn-sys { background: var(--text-main); color: var(--bg-deep); }
        .btn-sys.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn-flash { background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); }
        .btn-flash.active { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--accent); margin-top: -7px; box-shadow: 0 0 10px var(--accent-glow); }

        #statusTerminal { padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 12px; font-family: monospace; font-size: 13px; color: var(--accent); text-align: center; letter-spacing: 1px; transition: all 0.2s; }

        video { display: none; }
    </style>
</head>
<body>

    <div id="trackingContainer"><div class="pad-grid"></div><div id="airCursor"></div></div>

    <div class="control-hub">
        <div id="statusTerminal">[ SYSTEM STANDBY ]</div>
        <div>
            <label style="display: flex; justify-content: space-between;"><span>Kinetic Speed</span><span id="sensReadout" style="color: var(--accent);">1.5x</span></label>
            <input type="range" id="sensSlider" min="10" max="40" value="15">
        </div>
        <div class="row">
            <button id="sysToggle" class="pill-btn btn-sys active">System Active</button>
            <button id="flashToggle" class="pill-btn btn-flash">Screen Light</button>
        </div>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const NGROK_URL = "premorbidly-stomatous-gino.ngrok-free.dev";
        const socket = new WebSocket(`wss://${NGROK_URL}`);

        const airCursor = document.getElementById("airCursor");
        const trackingPad = document.getElementById("trackingContainer");
        const sensSlider = document.getElementById("sensSlider");
        const sensReadout = document.getElementById("sensReadout");
        const sysToggle = document.getElementById("sysToggle");
        const flashToggle = document.getElementById("flashToggle");
        const statusTerminal = document.getElementById("statusTerminal");
        const video = document.getElementById("webcam");

        let smoothX = 0.5, smoothY = 0.5;
        let prevTargetX = 0.5, prevTargetY = 0.5;
        const PREDICTION_FACTOR = 1.2; 

        // Dwell Timers
        let hoverFrames = 0;
        const HOVER_SINGLE = 12; 
        const HOVER_DOUBLE = 20; 
        let dwellAnchorX = 0.5, dwellAnchorY = 0.5;
        let isCursorLocked = false;
        
        const LOCK_TOLERANCE = 0.02;  
        const BREAKAWAY_FORCE = 0.06; 

        let prevWristX = 0, prevWristY = 0;
        let gestureCooldown = 0;
        let statusTimer = 0; 

        sensSlider.oninput = () => { sensReadout.innerText = (sensSlider.value / 10).toFixed(1) + "x"; };

        // --- UI TOGGLES ---
        let isActive = true;
        sysToggle.onclick = () => { 
            isActive = !isActive; 
            sysToggle.innerText = isActive ? "System Active" : "System Offline"; 
            sysToggle.classList.toggle("active", isActive); 
        };

        let isFlashActive = false;
        flashToggle.onclick = () => {
            isFlashActive = !isFlashActive;
            flashToggle.classList.toggle("active", isFlashActive);
            document.body.classList.toggle("flash-mode", isFlashActive);
            
            // Turn up the screen brightness visually for the user
            if (isFlashActive) sendCommandAlert("ILLUMINATION ACTIVE");
            else sendCommandAlert("ILLUMINATION OFFLINE");
        };

        function sendCommandAlert(msg) {
            statusTerminal.innerText = `[ CMD: ${msg} ]`;
            statusTerminal.style.background = "rgba(56, 189, 248, 0.3)";
            statusTerminal.style.color = "#fff";
            statusTimer = 60; 
        }

        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        const handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
            runningMode: "VIDEO", numHands: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;

        function isFingerUp(landmarks, tipObj, dipObj) { return landmarks[tipObj].y < landmarks[dipObj].y; }

        async function renderLoop() {
            if (isActive && video.readyState >= 2) {
                const results = await handLandmarker.detectForVideo(video, performance.now());
                
                if (statusTimer > 0) {
                    statusTimer--;
                    if (statusTimer === 0) {
                        statusTerminal.innerText = `[ TRACKING ACTIVE ]`;
                        statusTerminal.style.background = "rgba(0,0,0,0.6)";
                        statusTerminal.style.color = "var(--accent)";
                    }
                }

                if (results.landmarks && results.landmarks[0]) {
                    const lm = results.landmarks[0];
                    const tip = lm[8], thumb = lm[4], wrist = lm[0];

                    if (gestureCooldown > 0) gestureCooldown--;

                    const indexUp = isFingerUp(lm, 8, 6), middleUp = isFingerUp(lm, 12, 10), ringUp = isFingerUp(lm, 16, 14), pinkyUp = isFingerUp(lm, 20, 18);
                    const openHand = indexUp && middleUp && ringUp && pinkyUp;
                    const threeFingers = indexUp && middleUp && ringUp && !pinkyUp;
                    const peaceSign = indexUp && middleUp && !ringUp && !pinkyUp && !isFingerUp(lm, 4, 3);
                    const thumbsUp = !indexUp && !middleUp && !ringUp && !pinkyUp && (lm[4].y < lm[3].y);
                    const avgTipToThumbDist = (Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y) + Math.hypot(lm[12].x - lm[4].x, lm[12].y - lm[4].y) + Math.hypot(lm[16].x - lm[4].x, lm[16].y - lm[4].y)) / 3;

                    let triggeredGesture = null;

                    if (gestureCooldown === 0) {
                        const wristVelocityX = wrist.x - prevWristX;
                        const wristVelocityY = wrist.y - prevWristY;
                        
                        if (openHand) {
                            if (Math.abs(wristVelocityY) > 0.04 && Math.abs(wristVelocityY) > Math.abs(wristVelocityX)) {
                                triggeredGesture = wristVelocityY < 0 ? "SCROLL_UP" : "SCROLL_DOWN";
                            } else if (Math.abs(wristVelocityX) > 0.04 && Math.abs(wristVelocityX) > Math.abs(wristVelocityY)) {
                                triggeredGesture = wristVelocityX > 0 ? "SWIPE_LEFT" : "SWIPE_RIGHT";
                            }
                        } 
                        else if (peaceSign) triggeredGesture = "RIGHT_CLICK";
                        else if (threeFingers && !openHand) triggeredGesture = "SCREENSHOT";
                        else if (avgTipToThumbDist < 0.04 && !openHand) triggeredGesture = "PINCH_5";
                        else if (thumbsUp) triggeredGesture = "THUMBS_UP";

                        if (triggeredGesture && socket.readyState === WebSocket.OPEN) {
                            socket.send(`GEST:${triggeredGesture}`);
                            sendCommandAlert(triggeredGesture);
                            gestureCooldown = 40; 
                        }
                    }
                    prevWristX = wrist.x; prevWristY = wrist.y;

                    const rawX = 1 - tip.x, rawY = tip.y;
                    const sens = sensSlider.value / 10; 
                    const targetX = Math.max(0.02, Math.min(0.98, (rawX - 0.5) * sens + 0.5));
                    const targetY = Math.max(0.02, Math.min(0.98, (rawY - 0.5) * sens + 0.5));

                    const velX = targetX - prevTargetX, velY = targetY - prevTargetY;
                    let predictedX = Math.max(0.02, Math.min(0.98, targetX + (velX * PREDICTION_FACTOR)));
                    let predictedY = Math.max(0.02, Math.min(0.98, targetY + (velY * PREDICTION_FACTOR)));

                    const drift = Math.hypot(predictedX - dwellAnchorX, predictedY - dwellAnchorY);

                    if (isCursorLocked) {
                        smoothX = dwellAnchorX;
                        smoothY = dwellAnchorY;
                        hoverFrames++;

                        if (drift > BREAKAWAY_FORCE) {
                            isCursorLocked = false;
                            hoverFrames = 0;
                            trackingPad.classList.remove("clicking", "double-clicking");
                            airCursor.style.transform = `translate(-50%, -50%) scale(1)`;
                            airCursor.style.borderColor = "var(--accent)";
                        }
                    } else {
                        const distanceMoved = Math.hypot(velX, velY);
                        let dynamicLerp = distanceMoved < 0.002 ? 0.0 : (distanceMoved > 0.05 ? 0.7 : 0.35);
                        smoothX += (predictedX - smoothX) * dynamicLerp;
                        smoothY += (predictedY - smoothY) * dynamicLerp;
                        
                        if (drift < LOCK_TOLERANCE) {
                            hoverFrames++;
                            if (hoverFrames > 3) { 
                                isCursorLocked = true;
                                dwellAnchorX = smoothX;
                                dwellAnchorY = smoothY;
                            }
                        } else {
                            hoverFrames = 0;
                            dwellAnchorX = smoothX;
                            dwellAnchorY = smoothY;
                            airCursor.style.transform = `translate(-50%, -50%) scale(1)`;
                            airCursor.style.borderColor = "var(--accent)";
                        }
                    }
                    
                    prevTargetX = targetX; prevTargetY = targetY;

                    if (isCursorLocked) {
                        if (hoverFrames === HOVER_SINGLE) {
                            if (socket.readyState === WebSocket.OPEN) socket.send(`GEST:CLICK`);
                            sendCommandAlert("SINGLE CLICK");
                            trackingPad.classList.add("clicking");
                        } 
                        else if (hoverFrames === HOVER_DOUBLE) {
                            if (socket.readyState === WebSocket.OPEN) socket.send(`GEST:DOUBLE_CLICK`);
                            sendCommandAlert("DOUBLE CLICK");
                            trackingPad.classList.replace("clicking", "double-clicking");
                            airCursor.style.borderColor = "#fff";
                            
                            isCursorLocked = false; 
                            hoverFrames = 0;
                        } 
                        else if (hoverFrames < HOVER_SINGLE) {
                            const scale = 1 - (hoverFrames / HOVER_SINGLE) * 0.5;
                            airCursor.style.transform = `translate(-50%, -50%) scale(${scale})`;
                        } 
                        else if (hoverFrames < HOVER_DOUBLE) {
                            const scale = 0.5 - ((hoverFrames - HOVER_SINGLE) / (HOVER_DOUBLE - HOVER_SINGLE)) * 0.3;
                            airCursor.style.transform = `translate(-50%, -50%) scale(${scale})`;
                        }
                    }

                    airCursor.style.left = `${smoothX * 100}%`;
                    airCursor.style.top = `${smoothY * 100}%`;

                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(`${smoothX.toFixed(4)},${smoothY.toFixed(4)}`);
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }
        video.onloadeddata = renderLoop;
    </script>
</body>
</html>
