<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroOS · V7.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS — dark mode default
   ═══════════════════════════════════════════════ */
:root {
  --bg:         #0a0d14;
  --chassis:    #111520;
  --surface:    rgba(255,255,255,0.035);
  --border:     rgba(255,255,255,0.1);
  --border-hi:  rgba(255,255,255,0.22);
  --pad-bg:     #0e1220;
  --pad-hi:     rgba(255,255,255,0.03);
  --btn-bg:     #0b0e1a;
  --text:       #e8edf8;
  --muted:      #3d4a63;
  --muted2:     #5a6880;
  --cyan:       #00d4ff;
  --cyan-dim:   rgba(0,212,255,0.12);
  --cyan-glow:  rgba(0,212,255,0.28);
  --amber:      #f59e0b;
  --amber-dim:  rgba(245,158,11,0.15);
  --green:      #22c55e;
  --red:        #ef4444;
  --font:       'Barlow Condensed', sans-serif;
  --mono:       'Space Mono', monospace;
  --r:          14px;
  --r-sm:       10px;
}

/* FLASH MODE — full CSS-var override so every border auto-corrects */
body.flash-mode {
  --bg:        #dde3f0;
  --chassis:   #e8ecf5;
  --surface:   rgba(0,0,0,0.05);
  --border:    rgba(0,0,0,0.2);
  --border-hi: rgba(0,0,0,0.38);
  --pad-bg:    #d5daea;
  --pad-hi:    rgba(0,0,0,0.04);
  --btn-bg:    #ccd3e3;
  --text:      #111827;
  --muted:     #6b7280;
  --muted2:    #4b5563;
  --cyan:      #0284c7;
  --cyan-dim:  rgba(2,132,199,0.12);
  --cyan-glow: rgba(2,132,199,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.3s, color 0.3s;
}

/* subtle scanline overlay */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(
    to bottom,
    transparent, transparent 3px,
    rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
  );
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 11px 13px 16px;
  gap: 9px;
  max-width: 580px; margin: 0 auto;
}

/* ── TOP BAR ── */
#topbar {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; flex-shrink: 0;
}

#logo {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; color: var(--cyan); text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
#logo .ver { color: var(--muted2); font-weight: 400; }

.topbar-right { display: flex; align-items: center; gap: 7px; }

/* WS LED */
#wsLed {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 9px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.08em;
}
.led { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s; }
.led.on  { background: var(--green); box-shadow: 0 0 7px var(--green); }
.led.err { background: var(--red);   box-shadow: 0 0 7px var(--red); }

/* Camera button */
#camBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
#camBtn:active { transform: scale(0.95); background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
#camBtn svg { width: 11px; height: 11px; flex-shrink: 0; }

/* ── MODE TOGGLE ── */
#modeToggle {
  width: 100%; flex-shrink: 0;
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 3px; position: relative;
}
#modeSlider {
  position: absolute; inset: 3px;
  width: calc(50% - 3px);
  background: var(--cyan);
  border-radius: 9px;
  box-shadow: 0 0 20px var(--cyan-glow);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
#modeSlider.pad { transform: translateX(100%); }
.mode-btn {
  position: relative; z-index: 1;
  padding: 9px 0; border: none; border-radius: 9px;
  background: transparent; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); transition: color 0.25s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.mode-btn.active { color: #000; }
.mode-btn svg { width: 13px; height: 13px; }

/* ═══════════════════════════════════════════════
   MAIN AREA — 16:9 LANDSCAPE
   ═══════════════════════════════════════════════ */
#mainArea {
  width: 100%;
  aspect-ratio: 16 / 9;   /* landscape even in portrait phone */
  position: relative;
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--pad-bg);
}
#mainArea.click-flash {
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px var(--cyan-dim), inset 0 0 24px var(--cyan-dim);
}
#mainArea.dbl-flash {
  border-color: #fff;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15), inset 0 0 40px rgba(255,255,255,0.12);
}
#mainArea.drag-active {
  border-color: var(--amber);
  box-shadow: 0 0 0 2px var(--amber-dim);
  animation: dragPulse 1s ease-in-out infinite;
}
@keyframes dragPulse {
  0%,100% { box-shadow: 0 0 0 2px var(--amber-dim); }
  50%      { box-shadow: 0 0 0 4px rgba(245,158,11,0.3); }
}

/* ── AIR TRACKING PAD ── */
#airPad {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 28% 38%, rgba(0,212,255,0.06) 0%, transparent 65%);
  transition: opacity 0.3s;
}
.grid-dots {
  position: absolute; inset: 0; opacity: 0.1;
  background-image: radial-gradient(circle, var(--muted) 1px, transparent 1px);
  background-size: 20px 20px;
}
#airCursor {
  position: absolute; width: 24px; height: 24px;
  border: 2px solid var(--cyan); border-radius: 50%;
  background: var(--cyan-dim); backdrop-filter: blur(2px);
  transform: translate(-50%,-50%);
  pointer-events: none;
  box-shadow: 0 0 10px var(--cyan-glow);
  transition: border-color 0.12s, background 0.12s;
}
#airCursor::before {
  content: ''; position: absolute; inset: -7px;
  border: 1px solid rgba(0,212,255,0.2); border-radius: 50%;
}
#airCursor.click-state {
  border-color: #fff; background: rgba(255,255,255,0.15);
  box-shadow: 0 0 18px #fff;
}

/* ── LAPTOP TOUCHPAD ── */
#touchPad {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  transition: opacity 0.3s;
}

/* Gesture surface — brushed metal look */
#touchSurface {
  flex: 1; min-height: 0; position: relative; overflow: hidden;
  cursor: crosshair;
  /* brushed aluminum gradient */
  background:
    linear-gradient(170deg,
      rgba(255,255,255,0.025) 0%,
      rgba(255,255,255,0.008) 40%,
      rgba(0,0,0,0.06) 100%
    ),
    var(--pad-bg);
  border-bottom: 1px solid var(--border-hi);
  /* inset shadow = physical depth */
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.35), inset 0 -1px 3px rgba(255,255,255,0.03);
}

/* Fine horizontal grain */
#touchSurface::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.008) 2px,
    rgba(255,255,255,0.008) 3px
  );
}

/* Ghost cursor (where your real cursor is on screen) */
#ghostDot {
  position: absolute;
  width: 7px; height: 7px;
  background: var(--cyan);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px var(--cyan-glow);
  pointer-events: none;
  transition: left 0.04s linear, top 0.04s linear;
}

/* Finger contact indicators */
.fdot {
  position: absolute; width: 14px; height: 14px;
  border: 1.5px solid var(--cyan); border-radius: 50%;
  transform: translate(-50%,-50%); pointer-events: none;
  opacity: 0; background: var(--cyan-dim);
  transition: opacity 0.08s;
}

/* Corner markers */
.corner { position: absolute; width: 14px; height: 14px; border-color: var(--border-hi); border-style: solid; }
.corner.tl { top:10px; left:10px;  border-width:1.5px 0 0 1.5px; border-radius:3px 0 0 0; }
.corner.tr { top:10px; right:10px; border-width:1.5px 1.5px 0 0; border-radius:0 3px 0 0; }
.corner.bl { bottom: 10px; left:10px;  border-width:0 0 1.5px 1.5px; border-radius:0 0 0 3px; }
.corner.br { bottom: 10px; right:10px; border-width:0 1.5px 1.5px 0; border-radius:0 0 3px 0; }

/* Gesture badge */
#gestureBadge {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 9px; color: var(--cyan);
  letter-spacing: 0.1em;
  background: rgba(0,0,0,0.55); border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
  white-space: nowrap;
}
#gestureBadge.show { opacity: 1; }

/* Drag badge (top-right) */
#dragBadge {
  position: absolute; top: 8px; right: 8px;
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 9px; color: var(--amber);
  background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.35);
  padding: 3px 8px; border-radius: 20px;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#dragBadge.show { opacity: 1; }

/* First-use hint */
#padHint {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  pointer-events: none;
}
#padHint span {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.08em; line-height: 2;
}
#padHint.gone { opacity: 0; transition: opacity 0.4s; }

/* ── CLICK BUTTON ROW ── */
#clickButtons {
  height: 42px; flex-shrink: 0;
  display: flex;
  background: var(--btn-bg);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4), inset 0 -1px 2px rgba(255,255,255,0.025);
}
.click-btn {
  flex: 1; border: none; background: transparent;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.click-btn:active, .click-btn.pressed {
  background: var(--cyan-dim); color: var(--cyan);
}
#rightBtn { border-left: 1px solid var(--border); }
.click-btn svg { width: 11px; height: 11px; }

/* Ripple */
.ripple {
  position: absolute; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.45), transparent 70%);
  transform: translate(-50%,-50%) scale(0);
  animation: ripOut 0.5s ease-out forwards;
  pointer-events: none;
}
@keyframes ripOut { to { transform: translate(-50%,-50%) scale(7); opacity: 0; } }

/* hidden utility */
.hidden { opacity: 0 !important; pointer-events: none !important; }

/* ═══════════════════════════════════════════════
   STATUS
   ═══════════════════════════════════════════════ */
#statusBar {
  width: 100%; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 13px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-family: var(--mono); font-size: 10px; color: var(--cyan);
  letter-spacing: 0.06em; transition: all 0.2s; overflow: hidden;
}
.blink {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan); flex-shrink: 0;
  animation: blinkAnim 1.4s ease-in-out infinite;
}
@keyframes blinkAnim { 0%,100%{opacity:1}50%{opacity:0.15} }
#statusText { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#statusBar.alert { background: var(--cyan-dim); border-color: var(--cyan); }
#statusBar.alert .blink { animation: none; }

/* ═══════════════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════════════ */
#controls {
  width: 100%; flex-shrink: 0;
  background: var(--chassis); border: 1px solid var(--border);
  border-radius: var(--r); padding: 11px 13px;
  display: flex; flex-direction: column; gap: 9px;
}

.ctrl-row { display:flex; align-items:center; gap:10px; }
.ctrl-label {
  font-family: var(--font); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted2); white-space: nowrap;
}
.ctrl-val {
  font-family: var(--mono); font-size: 10px; color: var(--cyan); white-space: nowrap;
}

input[type="range"] { flex:1; -webkit-appearance:none; background:transparent; height:16px; }
input[type="range"]::-webkit-slider-runnable-track {
  height: 3px;
  background: linear-gradient(to right, var(--cyan) var(--pct,30%), rgba(255,255,255,0.08) var(--pct,30%));
  border-radius: 10px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width:16px; height:16px; border-radius:50%;
  background: var(--cyan); margin-top:-6.5px;
  box-shadow: 0 0 8px var(--cyan-glow);
  border: 2px solid var(--bg);
}

.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.action-btn {
  padding: 10px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted2); cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.on  { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
.action-btn.sys { background: rgba(34,197,94,0.1); border-color: var(--green); color: var(--green); }
.action-btn svg { width: 12px; height: 12px; }

video { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="logo">AEROS<span class="ver"> · V7.1</span></div>
    <div class="topbar-right">
      <button id="camBtn" onclick="cycleCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span id="camLabel">FRONT</span>
      </button>
      <div id="wsLed">
        <div class="led" id="wsDot"></div>
        <span id="wsLabel">OFFLINE</span>
      </div>
    </div>
  </div>

  <!-- MODE TOGGLE -->
  <div id="modeToggle">
    <div id="modeSlider"></div>
    <button class="mode-btn active" id="btnAir" onclick="setMode('air')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      Air Track
    </button>
    <button class="mode-btn" id="btnPad" onclick="setMode('pad')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <line x1="2" y1="15" x2="22" y2="15"/>
        <line x1="12" y1="15" x2="12" y2="20"/>
      </svg>
      Touchpad
    </button>
  </div>

  <!-- MAIN AREA — 16:9 landscape -->
  <div id="mainArea">

    <!-- AIR PAD -->
    <div id="airPad">
      <div class="grid-dots"></div>
      <div id="airCursor"></div>
    </div>

    <!-- LAPTOP TOUCHPAD -->
    <div id="touchPad" class="hidden">
      <!-- Gesture surface -->
      <div id="touchSurface">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="ghostDot"></div>
        <div class="fdot" id="fd0"></div>
        <div class="fdot" id="fd1"></div>
        <div class="fdot" id="fd2"></div>
        <div id="padHint">
          <span>SLIDE ↔ MOVE  ·  TAP = CLICK  ·  HOLD = DRAG</span>
          <span>✌ TWO FINGERS: SCROLL / PINCH ZOOM / RIGHT CLICK</span>
          <span>☰ THREE FINGERS: TASK VIEW / SHOW DESKTOP</span>
        </div>
        <div id="gestureBadge"></div>
        <div id="dragBadge">✥ DRAG MODE</div>
      </div>
      <!-- Physical click buttons -->
      <div id="clickButtons">
        <button class="click-btn" id="leftBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <path d="M3 10h8V3"/>
          </svg>
          Left Click
        </button>
        <button class="click-btn" id="rightBtn">
          Right Click
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <path d="M21 10h-8V3"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- STATUS -->
  <div id="statusBar">
    <div class="blink"></div>
    <div id="statusText">SYSTEM STANDBY</div>
  </div>

  <!-- CONTROLS -->
  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="sensSlider" min="10" max="40" value="15">
      <span class="ctrl-val" id="sensVal">1.5×</span>
    </div>
    <div class="btn-row">
      <button class="action-btn sys" id="btnSys" onclick="toggleSystem()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        System On
      </button>
      <button class="action-btn" id="btnFlash" onclick="toggleFlash()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 2H9l-1 7h4l-2 13 9-11h-5l1-9z"/>
        </svg>
        Screen Light
      </button>
    </div>
  </div>

</div>
<video id="webcam" autoplay playsinline></video>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

// ═══════════════════════════════════════════════
// 1€ FILTER
// ═══════════════════════════════════════════════
class OneEuroFilter {
  constructor(mc=1.2, b=0.5, dc=1.0) { this.mc=mc; this.b=b; this.dc=dc; this._x=null; this._dx=0; }
  _a(c) { const r=2*Math.PI*c/30; return r/(r+1); }
  filter(v) {
    if (this._x===null) { this._x=v; return v; }
    const rdx=v-this._x;
    this._dx += (rdx-this._dx)*this._a(this.dc);
    this._x  += (v-this._x)*this._a(this.mc+this.b*Math.abs(this._dx));
    return this._x;
  }
  reset(v) { this._x=v; this._dx=0; }
}
const fX=new OneEuroFilter(1.2,0.5), fY=new OneEuroFilter(1.2,0.5);

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const NGROK       = "vigorously-heterochthonous-mitch.ngrok-free.dev";
const EDGE        = 0.12;      // hand rarely reaches beyond this → remap to full screen
const HOVER_CLICK = 25, HOVER_DBL = 40;
const LOCK_TOL=0.022, BREAKAWAY=0.062, SEND_THRESH=0.0018;
const CONFIRM_F = 2;
const GCD = {
  SCROLL_UP:18, SCROLL_DOWN:18, SCROLL_LEFT:20, SCROLL_RIGHT:20,
  RIGHT_CLICK:35, SCREENSHOT:50, PINCH_5:40,
  THUMBS_UP:40, SWIPE_LEFT:35, SWIPE_RIGHT:35,
  CLICK:50, DOUBLE_CLICK:50,
  TASK_VIEW:50, SHOW_DESKTOP:50, NEXT_WINDOW:35, PREV_WINDOW:35,
  ZOOM_IN:7, ZOOM_OUT:7, DRAG_START:0, DROP:30
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let curX=0.5, curY=0.5;
let anchorX=0.5, anchorY=0.5;
let prevWY=0;
let locked=false, hoverF=0, gestureCd=0;
let pendingG=null, pendingGC=0;
let scrollBuf=[];
let statusTimer=0;
let lastSX=-1, lastSY=-1;
let isActive=true, isFlash=false;
let currentMode='air';
let handLandmarker=null;

// Camera
let cameras=[], camIdx=0;

// ═══════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════
const airCursor=document.getElementById('airCursor');
const airPad=document.getElementById('airPad');
const touchPad=document.getElementById('touchPad');
const touchSurface=document.getElementById('touchSurface');
const ghostDot=document.getElementById('ghostDot');
const mainArea=document.getElementById('mainArea');
const statusBar=document.getElementById('statusBar');
const statusText=document.getElementById('statusText');
const sensSlider=document.getElementById('sensSlider');
const sensVal=document.getElementById('sensVal');
const wsDot=document.getElementById('wsDot');
const wsLabel=document.getElementById('wsLabel');
const padHint=document.getElementById('padHint');
const gestureBadge=document.getElementById('gestureBadge');
const dragBadge=document.getElementById('dragBadge');
const fingerDots=[0,1,2].map(i=>document.getElementById(`fd${i}`));
const video=document.getElementById('webcam');

// Slider fill
sensSlider.addEventListener('input', () => {
  sensSlider.style.setProperty('--pct', ((sensSlider.value-10)/30*100).toFixed(0)+'%');
  sensVal.textContent = (sensSlider.value/10).toFixed(1)+'×';
});
sensSlider.dispatchEvent(new Event('input'));

// ═══════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════
const socket = new WebSocket(`wss://${NGROK}`);
socket.onopen  = () => { wsDot.className='led on';  wsLabel.textContent='LINKED'; };
socket.onclose = () => { wsDot.className='led err'; wsLabel.textContent='OFFLINE'; };
socket.onerror = () => { wsDot.className='led err'; wsLabel.textContent='ERROR'; };
const wsSend = msg => { if (socket.readyState===WebSocket.OPEN) socket.send(msg); };

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
let hintTimer=null;
function alert2(msg) {
  statusText.textContent=msg;
  statusBar.classList.add('alert');
  statusTimer=80;
}
function resetHUD() {
  statusBar.classList.remove('alert');
  statusText.textContent=currentMode==='air'?'AIR TRACKING · ACTIVE':'TOUCHPAD · ACTIVE';
}
function showBadge(msg) {
  gestureBadge.textContent=msg;
  gestureBadge.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>gestureBadge.classList.remove('show'), 1100);
}

// ═══════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════
window.setMode = m => {
  currentMode=m;
  document.getElementById('modeSlider').className=m==='pad'?'pad':'';
  document.getElementById('btnAir').classList.toggle('active',m==='air');
  document.getElementById('btnPad').classList.toggle('active',m==='pad');
  airPad.classList.toggle('hidden',m==='pad');
  touchPad.classList.toggle('hidden',m==='air');
  resetHUD();
};

// ═══════════════════════════════════════════════
// SYSTEM / FLASH
// ═══════════════════════════════════════════════
window.toggleSystem = () => {
  isActive=!isActive;
  const b=document.getElementById('btnSys');
  b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>${isActive?' System On':' System Off'}`;
  b.className=isActive?'action-btn sys':'action-btn';
  alert2(isActive?'SYSTEM ONLINE':'SYSTEM OFFLINE');
};
window.toggleFlash = () => {
  isFlash=!isFlash;
  document.getElementById('btnFlash').classList.toggle('on',isFlash);
  document.body.classList.toggle('flash-mode',isFlash);
  alert2(isFlash?'ILLUMINATION ON':'ILLUMINATION OFF');
};

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
async function enumCameras() {
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vids = devs.filter(d=>d.kind==='videoinput');
    cameras = vids.map(d => ({
      deviceId: d.deviceId,
      label: d.label || 'Camera',
      facing: /front|user/i.test(d.label) ? 'front' : 'back',
      isUltra: /ultra|wide/i.test(d.label)
    }));
    cameras.sort((a,b) => a.facing==='front' ? -1 : 1);
    updateCamBtn();
  } catch(e) {}
}
function camShortLabel(c) {
  if (!c) return 'FRONT';
  if (c.facing==='front') return 'FRONT';
  if (c.isUltra) return 'ULTRA';
  return 'BACK';
}
function updateCamBtn() {
  document.getElementById('camLabel').textContent = camShortLabel(cameras[camIdx]);
}
window.cycleCamera = async () => {
  if (cameras.length < 2) return;
  camIdx = (camIdx+1) % cameras.length;
  await startStream(cameras[camIdx].deviceId);
  updateCamBtn();
  alert2('CAMERA: ' + camShortLabel(cameras[camIdx]));
};
async function startStream(deviceId=null, facingMode='user') {
  if (video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  try {
    const c = deviceId
      ? { video:{ deviceId:{exact:deviceId}, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:60,max:120} } }
      : { video:{ facingMode, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:60,max:120} } };
    video.srcObject = await navigator.mediaDevices.getUserMedia(c);
    await video.play();
  } catch(e) { alert2('CAMERA ERROR'); }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const remapEdge = v => Math.max(0,Math.min(1,(v-EDGE)/(1-2*EDGE)));
const edgeAccel = v => { const d=v-0.5; return Math.max(0,Math.min(1,0.5+d*(1+Math.abs(d)*0.95))); };
const fingerUp  = (lm,tip,dip) => lm[tip].y < lm[dip].y;
function fireGesture(name) {
  wsSend(`GEST:${name}`);
  alert2(name.replace(/_/g,' '));
  gestureCd = GCD[name] ?? 40;
  scrollBuf=[];
}
function sendPos(x,y,force=false) {
  if (force || Math.hypot(x-lastSX,y-lastSY)>SEND_THRESH) {
    wsSend(`${x.toFixed(3)},${y.toFixed(3)}`);
    lastSX=x; lastSY=y;
    ghostDot.style.left=`${x*100}%`;
    ghostDot.style.top=`${y*100}%`;
  }
}
function spawnRipple(el,x,y) {
  const r=document.createElement('div');
  r.className='ripple'; r.style.left=x+'px'; r.style.top=y+'px';
  el.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}
function updateFingerDots() {
  const ts=[...tpState.values()];
  const rect=touchSurface.getBoundingClientRect();
  fingerDots.forEach((d,i)=>{
    if (i<ts.length) {
      d.style.left=`${ts[i].curX-rect.left}px`;
      d.style.top=`${ts[i].curY-rect.top}px`;
      d.style.opacity='1';
    } else d.style.opacity='0';
  });
}

// ═══════════════════════════════════════════════
// TOUCHPAD GESTURE ENGINE
// ═══════════════════════════════════════════════
const tpState = new Map(); // id→{origX,origY,prevX,prevY,curX,curY,startTime}
let tpMode='idle';
let tpLastTap=0;
let tpDragActive=false;
let tpDragTimer=null;
let tpPinchDist=0;
let tpScrollThr=0, tpZoomThr=0;
let tpScrollRefY=0, tpScrollRefX=0;
let tp3RefY=0, tp3RefX=0;

function tpArr() { return [...tpState.values()]; }

function tpEndDrag() {
  clearTimeout(tpDragTimer);
  if (tpDragActive) {
    wsSend('GEST:DROP');
    alert2('DROPPED');
    tpDragActive=false;
    mainArea.classList.remove('drag-active');
    dragBadge.classList.remove('show');
  }
}

// Surface touch events
touchSurface.addEventListener('touchstart', e => {
  e.preventDefault();
  padHint.classList.add('gone');
  [...e.changedTouches].forEach(t => {
    tpState.set(t.identifier, {
      origX:t.clientX, origY:t.clientY,
      prevX:t.clientX, prevY:t.clientY,
      curX:t.clientX,  curY:t.clientY,
      startTime:Date.now()
    });
  });
  const n=tpState.size;
  if (n===1) {
    tpMode='move';
    tpDragTimer=setTimeout(()=>{
      const ts=tpArr();
      if (tpState.size===1&&ts.length) {
        if (Math.hypot(ts[0].curX-ts[0].origX, ts[0].curY-ts[0].origY)<14) {
          tpDragActive=true;
          wsSend('GEST:DRAG_START');
          sendPos(curX,curY,true);
          alert2('DRAG MODE · RELEASE TO DROP');
          mainArea.classList.add('drag-active');
          dragBadge.classList.add('show');
        }
      }
    }, 600);
  } else if (n===2) {
    clearTimeout(tpDragTimer);
    tpMode='two';
    const ts=tpArr();
    tpPinchDist=Math.hypot(ts[0].curX-ts[1].curX, ts[0].curY-ts[1].curY);
    tpScrollRefY=(ts[0].curY+ts[1].curY)/2;
    tpScrollRefX=(ts[0].curX+ts[1].curX)/2;
    tpScrollThr=0; tpZoomThr=0;
  } else if (n===3) {
    clearTimeout(tpDragTimer);
    tpMode='three';
    const ts=tpArr();
    tp3RefY=ts.reduce((s,t)=>s+t.curY,0)/3;
    tp3RefX=ts.reduce((s,t)=>s+t.curX,0)/3;
  }
  updateFingerDots();
}, {passive:false});

touchSurface.addEventListener('touchmove', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const s=tpState.get(t.identifier);
    if (s) { s.prevX=s.curX; s.prevY=s.curY; s.curX=t.clientX; s.curY=t.clientY; }
  });
  updateFingerDots();
  const n=tpState.size, ts=tpArr();

  if (n===1 && tpMode==='move') {
    const t=ts[0];
    const dx=t.curX-t.prevX, dy=t.curY-t.prevY;
    if (!tpDragActive && Math.hypot(t.curX-t.origX,t.curY-t.origY)>14) clearTimeout(tpDragTimer);
    const spd=Math.hypot(dx,dy);
    const acc=spd<4?0.003:spd<12?0.0048:0.0072;
    curX=Math.max(0,Math.min(1,curX+dx*acc));
    curY=Math.max(0,Math.min(1,curY+dy*acc));
    sendPos(curX,curY);
  } else if (n===2) {
    const dist=Math.hypot(ts[0].curX-ts[1].curX, ts[0].curY-ts[1].curY);
    const midY=(ts[0].curY+ts[1].curY)/2;
    const midX=(ts[0].curX+ts[1].curX)/2;
    const dd=dist-tpPinchDist;
    const sdY=midY-tpScrollRefY, sdX=midX-tpScrollRefX;

    if (tpZoomThr>0) tpZoomThr--;
    if (tpScrollThr>0) tpScrollThr--;

    if (Math.abs(dd)>9 && tpZoomThr===0) {
      const g=dd>0?'ZOOM_IN':'ZOOM_OUT';
      wsSend(`GEST:${g}`);
      showBadge(dd>0?'🔍 ZOOM IN':'🔍 ZOOM OUT');
      tpZoomThr=7; tpScrollRefY=midY; tpScrollRefX=midX;
    } else if (Math.abs(sdY)>6 && tpScrollThr===0 && Math.abs(dd)<5) {
      const g=sdY<0?'SCROLL_UP':'SCROLL_DOWN';
      wsSend(`GEST:${g}`);
      showBadge(sdY<0?'⬆ SCROLL UP':'⬇ SCROLL DOWN');
      tpScrollThr=4; tpScrollRefY=midY;
    } else if (Math.abs(sdX)>10 && tpScrollThr===0 && Math.abs(dd)<5) {
      const g=sdX<0?'SCROLL_LEFT':'SCROLL_RIGHT';
      wsSend(`GEST:${g}`);
      showBadge(sdX<0?'◀ SCROLL LEFT':'▶ SCROLL RIGHT');
      tpScrollThr=6; tpScrollRefX=midX;
    }
    tpPinchDist=dist;
  }
}, {passive:false});

touchSurface.addEventListener('touchend', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(ct => {
    const touch=tpState.get(ct.identifier);
    const countBefore=tpState.size;
    if (!touch) { tpState.delete(ct.identifier); return; }
    const elapsed=Date.now()-touch.startTime;
    const moved=Math.hypot(ct.clientX-touch.origX, ct.clientY-touch.origY);
    const rect=touchSurface.getBoundingClientRect();
    const rx=ct.clientX-rect.left, ry=ct.clientY-rect.top;

    if (countBefore===1 && tpMode==='move') {
      clearTimeout(tpDragTimer);
      if (tpDragActive) {
        tpEndDrag();
      } else if (elapsed<230 && moved<13) {
        spawnRipple(touchSurface,rx,ry);
        const now=Date.now();
        if (now-tpLastTap<380) {
          wsSend('GEST:DOUBLE_CLICK'); alert2('DOUBLE CLICK');
          mainArea.classList.add('dbl-flash');
          setTimeout(()=>mainArea.classList.remove('dbl-flash'),300);
          tpLastTap=0;
        } else {
          wsSend('GEST:CLICK'); alert2('LEFT CLICK');
          mainArea.classList.add('click-flash');
          setTimeout(()=>mainArea.classList.remove('click-flash'),200);
          tpLastTap=now;
        }
      }
    } else if (countBefore===2 && tpMode==='two') {
      if (elapsed<210 && moved<13) {
        wsSend('GEST:RIGHT_CLICK'); alert2('RIGHT CLICK');
        spawnRipple(touchSurface,rx,ry);
      }
    } else if (countBefore===3 && tpMode==='three') {
      const ts=tpArr(); // still 3 in map
      const avgY=ts.reduce((s,t)=>s+t.curY,0)/ts.length;
      const avgX=ts.reduce((s,t)=>s+t.curX,0)/ts.length;
      const dy=avgY-tp3RefY, dx=avgX-tp3RefX;
      if (Math.abs(dy)>22 || Math.abs(dx)>22) {
        let g;
        if (Math.abs(dy)>=Math.abs(dx)) g=dy<0?'TASK_VIEW':'SHOW_DESKTOP';
        else g=dx<0?'NEXT_WINDOW':'PREV_WINDOW';
        wsSend(`GEST:${g}`);
        alert2(g.replace(/_/g,' '));
        showBadge(g==='TASK_VIEW'?'⬆ TASK VIEW':g==='SHOW_DESKTOP'?'⬇ SHOW DESKTOP':g==='NEXT_WINDOW'?'▶ NEXT WINDOW':'◀ PREV WINDOW');
      }
    }
    tpState.delete(ct.identifier);
  });
  updateFingerDots();
  if (tpState.size===0) { tpMode='idle'; }
}, {passive:false});

touchSurface.addEventListener('touchcancel', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t=>tpState.delete(t.identifier));
  clearTimeout(tpDragTimer);
  if (tpDragActive) tpEndDrag();
  updateFingerDots(); tpMode='idle';
}, {passive:false});

// Click buttons
function bindClickBtn(id, gesture, label) {
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart', e=>{
    e.preventDefault(); btn.classList.add('pressed');
    wsSend(`GEST:${gesture}`); alert2(label);
    mainArea.classList.add('click-flash');
    setTimeout(()=>mainArea.classList.remove('click-flash'),200);
  },{passive:false});
  btn.addEventListener('touchend', e=>{ e.preventDefault(); btn.classList.remove('pressed'); },{passive:false});
}
bindClickBtn('leftBtn',  'CLICK',       'LEFT CLICK');
bindClickBtn('rightBtn', 'RIGHT_CLICK', 'RIGHT CLICK');

// ═══════════════════════════════════════════════
// AIR TRACKING — CORNER FIX + 1€ + GESTURES
// ═══════════════════════════════════════════════
function airFrame(lm) {
  const tip=lm[8], wrist=lm[0];
  const sens=sensSlider.value/10;

  // Corner fix: expand realistic hand range [EDGE, 1-EDGE] → [0,1]
  // then edge-accelerate so corners are reachable with minimal hand contortion
  const rawX=remapEdge(1-tip.x), rawY=remapEdge(tip.y);
  const tX=Math.max(0,Math.min(1,edgeAccel((rawX-0.5)*sens+0.5)));
  const tY=Math.max(0,Math.min(1,edgeAccel((rawY-0.5)*sens+0.5)));

  if (gestureCd>0) {
    gestureCd--;
    curX=fX.filter(tX); curY=fY.filter(tY);
    locked=false; hoverF=0; anchorX=curX; anchorY=curY;
    pendingG=null; pendingGC=0;
    airCursor.style.transform='translate(-50%,-50%) scale(1)';
    airCursor.classList.remove('click-state');
    mainArea.classList.remove('click-flash','dbl-flash');
  } else {
    // Gestures
    const iU=fingerUp(lm,8,6), mU=fingerUp(lm,12,10), rU=fingerUp(lm,16,14), pU=fingerUp(lm,20,18);
    const open=iU&&mU&&rU&&pU, three=iU&&mU&&rU&&!pU;
    const peace=iU&&mU&&!rU&&!pU&&!fingerUp(lm,4,3);
    const folded=!iU&&!mU&&!rU&&!pU;
    const thumbUp=folded&&(lm[4].y<lm[9].y-0.07);
    const thumbL=folded&&(lm[4].x>lm[9].x+0.07)&&(Math.abs(lm[4].y-lm[9].y)<0.07);
    const thumbR=folded&&(lm[4].x<lm[9].x-0.07)&&(Math.abs(lm[4].y-lm[9].y)<0.07);
    const pinch=(Math.hypot(lm[8].x-lm[4].x,lm[8].y-lm[4].y)+Math.hypot(lm[12].x-lm[4].x,lm[12].y-lm[4].y)+Math.hypot(lm[16].x-lm[4].x,lm[16].y-lm[4].y))/3;
    const wvy=wrist.y-prevWY;

    let rawG=null;
    if (open&&Math.abs(wvy)>0.045) {
      const dir=wvy<0?'SCROLL_UP':'SCROLL_DOWN';
      scrollBuf.push(dir);
      if (scrollBuf.length>3) scrollBuf.shift();
      if (scrollBuf.length===3&&scrollBuf.every(d=>d===dir)) rawG=dir;
    } else {
      scrollBuf=[];
      if (peace) rawG='RIGHT_CLICK';
      else if (three&&!open) rawG='SCREENSHOT';
      else if (pinch<0.04&&!open) rawG='PINCH_5';
      else if (thumbUp) rawG='THUMBS_UP';
      else if (thumbL) rawG='SWIPE_LEFT';
      else if (thumbR) rawG='SWIPE_RIGHT';
    }

    if (rawG) {
      if (rawG===pendingG) { if (++pendingGC>=CONFIRM_F) { fireGesture(rawG); pendingG=null; pendingGC=0; } }
      else { pendingG=rawG; pendingGC=1; }
    } else {
      if (pendingGC>0) pendingGC--; else pendingG=null;
    }

    // 1€ + dwell lock
    const fx=fX.filter(tX), fy=fY.filter(tY);
    const drift=Math.hypot(fx-anchorX, fy-anchorY);

    if (locked) {
      curX=anchorX; curY=anchorY; hoverF++;
      if (drift>BREAKAWAY) {
        locked=false; hoverF=0;
        mainArea.classList.remove('click-flash','dbl-flash');
        airCursor.style.transform='translate(-50%,-50%) scale(1)';
        airCursor.classList.remove('click-state');
        fX.reset(fx); fY.reset(fy); gestureCd=20;
      }
    } else {
      curX=fx; curY=fy;
      if (drift<LOCK_TOL) { if (++hoverF>5) { locked=true; anchorX=curX; anchorY=curY; } }
      else { hoverF=0; anchorX=curX; anchorY=curY; airCursor.style.transform='translate(-50%,-50%) scale(1)'; }
    }

    if (locked) {
      if (hoverF===HOVER_CLICK) {
        wsSend('GEST:CLICK'); alert2('CLICK');
        mainArea.classList.add('click-flash'); airCursor.classList.add('click-state');
      } else if (hoverF===HOVER_DBL) {
        wsSend('GEST:DOUBLE_CLICK'); alert2('DOUBLE CLICK');
        mainArea.classList.replace('click-flash','dbl-flash');
        locked=false; hoverF=0; gestureCd=GCD.DOUBLE_CLICK;
      } else if (hoverF<HOVER_CLICK) {
        airCursor.style.transform=`translate(-50%,-50%) scale(${1-(hoverF/HOVER_CLICK)*0.5})`;
      } else if (hoverF<HOVER_DBL) {
        airCursor.style.transform=`translate(-50%,-50%) scale(${0.5-((hoverF-HOVER_CLICK)/(HOVER_DBL-HOVER_CLICK))*0.3})`;
      }
    }
  }

  prevWY=wrist.y;
  airCursor.style.left=`${curX*100}%`;
  airCursor.style.top=`${curY*100}%`;
  sendPos(curX,curY);
}

// ═══════════════════════════════════════════════
// BOOT + LOOP
// ═══════════════════════════════════════════════
async function boot() {
  try {
    alert2('BOOTING NPU…');
    const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
    handLandmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{ modelAssetPath:`https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate:'CPU' },
      runningMode:'VIDEO', numHands:1
    });
    await startStream(null,'user');
    await enumCameras();
    alert2('TRACKING ONLINE');
    loop();
  } catch(err) {
    alert2('BOOT FAILED — CHECK CAMERA');
    console.error(err);
  }
}

async function loop() {
  if (currentMode==='air' && isActive && video.readyState>=2 && handLandmarker) {
    const res=await handLandmarker.detectForVideo(video,performance.now());
    if (statusTimer>0 && --statusTimer===0) resetHUD();
    if (res.landmarks?.[0]) airFrame(res.landmarks[0]);
  } else {
    if (statusTimer>0 && --statusTimer===0) resetHUD();
  }
  requestAnimationFrame(loop);
}

boot();
</script>
