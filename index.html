<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroOS · V8</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #070d1a;
  --surface:  rgba(255,255,255,0.04);
  --border:   rgba(255,255,255,0.08);
  --border-hi:rgba(255,255,255,0.16);
  --cyan:     #22d3ee;
  --cyan-dim: rgba(34,211,238,0.18);
  --cyan-glow:rgba(34,211,238,0.35);
  --green:    #4ade80;
  --red:      #f87171;
  --text:     #f0f4ff;
  --muted:    #4a5578;
  --font-ui:  'Syne', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

/* Light Mode Variables for Flashlight */
body.light-mode {
  --bg:       #ffffff;
  --surface:  rgba(0,0,0,0.04);
  --border:   rgba(0,0,0,0.2);
  --border-hi:rgba(0,0,0,0.4);
  --cyan:     #0ea5e9;
  --cyan-dim: rgba(14,165,233,0.18);
  --text:     #0f172a;
  --muted:    #64748b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); touch-action: none; user-select: none; transition: background 0.3s, color 0.3s; }

#app { display: flex; flex-direction: column; height: 100%; padding: 14px; gap: 12px; max-width: 600px; margin: 0 auto; }

/* Topbar */
#topbar { display: flex; justify-content: space-between; align-items: center; }
#logo { font-size: 13px; font-weight: 800; letter-spacing: 0.15em; color: var(--cyan); }
#wsLed { display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }

/* Main Area - Forced Vertical Setup */
#mainArea { flex: 1; position: relative; border-radius: 18px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }

/* Air Pad */
#airPad { position: absolute; inset: 0; transition: opacity 0.3s; }
.grid-dots { position: absolute; inset: 0; opacity: 0.12; background-image: radial-gradient(circle, var(--muted) 1px, transparent 1px); background-size: 22px 22px; }
#airCursor { position: absolute; width: 28px; height: 28px; border: 2px solid var(--cyan); border-radius: 50%; transform: translate(-50%, -50%); background: var(--cyan-dim); transition: 0.1s; }

/* Physical Touchpad Design */
#touchPad { display: none; flex-direction: column; height: 100%; background: var(--surface); }
#touchPad.visible { display: flex; }
#touchSurface { flex: 1; position: relative; }
#touchHint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: center; pointer-events: none; }
#ghostDot { position: absolute; width: 10px; height: 10px; background: var(--cyan); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }

/* Laptop Buttons */
#hardwareButtons { height: 60px; display: flex; border-top: 1px solid var(--border-hi); }
.hw-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; border-right: 1px solid var(--border); transition: background 0.1s; }
.hw-btn:last-child { border-right: none; }
.hw-btn:active { background: var(--cyan-dim); color: var(--cyan); }

/* Controls Grid */
#controls { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.action-btn { padding: 10px; border-radius: 10px; font-family: var(--font-ui); font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; display: flex; justify-content: center; gap: 6px; }
.action-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

video { display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">AEROOS · V8</div>
    <div id="wsLed"><div class="dot" id="wsDot"></div><span id="wsLabel">OFFLINE</span></div>
  </div>

  <div id="mainArea">
    <div id="airPad">
      <div class="grid-dots"></div>
      <div id="airCursor"></div>
    </div>
    
    <div id="touchPad">
      <div id="touchSurface">
        <div id="touchHint">DOUBLE TAP & HOLD TO DRAG<br>PINCH TO ZOOM</div>
        <div id="ghostDot"></div>
      </div>
      <div id="hardwareButtons">
        <div class="hw-btn" id="btnLeftClick">LEFT CLICK</div>
        <div class="hw-btn" id="btnRightClick">RIGHT CLICK</div>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="btn-grid">
      <button class="action-btn active" id="btnAir" onclick="setMode('air')">Air Track</button>
      <button class="action-btn" id="btnPad" onclick="setMode('pad')">Touchpad</button>
    </div>
    <div class="btn-grid">
      <button class="action-btn" id="btnCam" onclick="toggleCamera()">Front Cam</button>
      <button class="action-btn" id="btnFlash" onclick="toggleFlash()">Screen Light</button>
    </div>
  </div>
</div>
<video id="webcam" autoplay playsinline></video>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const NGROK_URL = "YOUR_NGROK_URL_HERE.ngrok-free.app";

const socket = new WebSocket(`wss://${NGROK_URL}`);
socket.onopen  = () => { document.getElementById('wsDot').className = 'dot on'; document.getElementById('wsLabel').textContent = 'LINKED'; };

function wsSend(msg) { if (socket.readyState === WebSocket.OPEN) socket.send(msg); }

// --- STATE ---
let currentMode = 'air';
let isFlash = false;
let useFrontCam = true;
let handLandmarker = null;
let isDragging = false;
let lastTapT = 0;
let tpStartX = 0, tpStartY = 0, cursorX = 0.5, cursorY = 0.5;
let initialPinchDist = null;

// --- UI TOGGLES ---
window.setMode = (m) => {
  currentMode = m;
  document.getElementById('btnAir').classList.toggle('active', m === 'air');
  document.getElementById('btnPad').classList.toggle('active', m === 'pad');
  document.getElementById('airPad').style.display = m === 'air' ? 'block' : 'none';
  document.getElementById('touchPad').classList.toggle('visible', m === 'pad');
};

window.toggleFlash = () => {
  isFlash = !isFlash;
  document.body.classList.toggle('light-mode', isFlash);
  document.getElementById('btnFlash').classList.toggle('active', isFlash);
};

window.toggleCamera = async () => {
  useFrontCam = !useFrontCam;
  document.getElementById('btnCam').textContent = useFrontCam ? "Front Cam" : "Rear Cam";
  document.getElementById('btnCam').classList.toggle('active', !useFrontCam);
  await bootCamera(); // Restart stream with new lens
};

// --- TOUCHPAD LOGIC (DRAG & DROP + ZOOM) ---
const tSurf = document.getElementById('touchSurface');

tSurf.addEventListener('touchstart', e => {
  e.preventDefault();
  document.getElementById('touchHint').style.opacity = 0;
  
  if (e.touches.length === 2) {
    initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    return;
  }

  const now = Date.now();
  tpStartX = e.touches[0].clientX;
  tpStartY = e.touches[0].clientY;

  // Double Tap & Hold logic for Dragging
  if (now - lastTapT < 300) {
    isDragging = true;
    wsSend('GEST:LEFT_DOWN');
  }
}, { passive: false });

tSurf.addEventListener('touchmove', e => {
  e.preventDefault();
  
  // Pinch to Zoom
  if (e.touches.length === 2 && initialPinchDist) {
    const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (newDist - initialPinchDist > 30) { wsSend('GEST:ZOOM_IN'); initialPinchDist = newDist; }
    else if (initialPinchDist - newDist > 30) { wsSend('GEST:ZOOM_OUT'); initialPinchDist = newDist; }
    return;
  }

  const dx = e.touches[0].clientX - tpStartX;
  const dy = e.touches[0].clientY - tpStartY;
  
  cursorX = Math.max(0, Math.min(1, cursorX + (dx * 0.004)));
  cursorY = Math.max(0, Math.min(1, cursorY + (dy * 0.004)));
  
  wsSend(`${cursorX},${cursorY}`);
  document.getElementById('ghostDot').style.left = `${cursorX * 100}%`;
  document.getElementById('ghostDot').style.top = `${cursorY * 100}%`;
  
  tpStartX = e.touches[0].clientX;
  tpStartY = e.touches[0].clientY;
}, { passive: false });

tSurf.addEventListener('touchend', e => {
  e.preventDefault();
  initialPinchDist = null;
  
  if (isDragging) {
    isDragging = false;
    wsSend('GEST:LEFT_UP');
  } else if (e.changedTouches.length === 1) {
    lastTapT = Date.now();
  }
}, { passive: false });

// Hardware Button Events
document.getElementById('btnLeftClick').addEventListener('touchstart', () => wsSend('GEST:LEFT_DOWN'));
document.getElementById('btnLeftClick').addEventListener('touchend', () => wsSend('GEST:LEFT_UP'));
document.getElementById('btnRightClick').addEventListener('touchstart', () => wsSend('GEST:RIGHT_CLICK'));

// --- AI BOOT ---
async function bootCamera() {
  const video = document.getElementById('webcam');
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFrontCam ? "user" : "environment", width: 640, height: 480 }
  });
  video.srcObject = stream;
}

async function bootAI() {
  const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "CPU" },
    runningMode: "VIDEO", numHands: 1
  });
  await bootCamera();
  aiLoop();
}

// Basic AI Loop (Kept clean for performance)
async function aiLoop() {
  const video = document.getElementById('webcam');
  if (currentMode === 'air' && video.readyState >= 2 && handLandmarker) {
    const res = await handLandmarker.detectForVideo(video, performance.now());
    if (res.landmarks?.[0]) {
      const tip = res.landmarks[0][8];
      let x = useFrontCam ? (1 - tip.x) : tip.x; // Invert X if using front cam
      wsSend(`${x},${tip.y}`);
      document.getElementById('airCursor').style.left = `${x * 100}%`;
      document.getElementById('airCursor').style.top = `${tip.y * 100}%`;
    }
  }
  requestAnimationFrame(aiLoop);
}

bootAI();
</script>
</body>
</html>
