<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS — dark mode default
   ═══════════════════════════════════════════════ */
:root {
  --bg:         #0a0d14;
  --chassis:    #111520;
  --surface:    rgba(255,255,255,0.035);
  --border:     rgba(255,255,255,0.1);
  --border-hi:  rgba(255,255,255,0.22);
  --pad-bg:     #0e1220;
  --btn-bg:     #0b0e1a;
  --text:       #e8edf8;
  --muted:      #3d4a63;
  --muted2:     #5a6880;
  --cyan:       #00d4ff;
  --cyan-dim:   rgba(0,212,255,0.12);
  --cyan-glow:  rgba(0,212,255,0.28);
  --amber:      #f59e0b;
  --amber-dim:  rgba(245,158,11,0.18);
  --green:      #22c55e;
  --green-dim:  rgba(34,197,94,0.15);
  --red:        #ef4444;
  --font:       'Barlow Condensed', sans-serif;
  --mono:       'Space Mono', monospace;
  --r:          14px;
  --r-sm:       10px;
}

/* Flash mode — full token override so all borders auto-correct */
body.flash-mode {
  --bg:        #dde3f0;
  --chassis:   #e8ecf5;
  --surface:   rgba(0,0,0,0.05);
  --border:    rgba(0,0,0,0.2);
  --border-hi: rgba(0,0,0,0.38);
  --pad-bg:    #d5daea;
  --btn-bg:    #ccd3e3;
  --text:      #111827;
  --muted:     #6b7280;
  --muted2:    #4b5563;
  --cyan:      #0284c7;
  --cyan-dim:  rgba(2,132,199,0.12);
  --cyan-glow: rgba(2,132,199,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.3s, color 0.3s;
}

/* Scanline overlay */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(
    to bottom, transparent, transparent 3px,
    rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px
  );
}

/* ═══════════════════════════════════════════════
   LAYOUT — full-height flexbox column
   Top bar → mode toggle → [padZone grows] → status → controls
   ═══════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  height: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 14px env(safe-area-inset-bottom, 14px);
  gap: 10px;
  max-width: 580px; margin: 0 auto;
}

/* The flex-grow region — keeps pad vertically centered in remaining space */
#padZone {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px 0;
}

/* ── TOP BAR ── */
#topbar {
  width: 100%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
#logo {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; color: var(--cyan); text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.topbar-right { display: flex; align-items: center; gap: 7px; }

/* WS LED */
#wsLed {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 9px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.08em;
}
.led { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s; }
.led.on  { background: var(--green); box-shadow: 0 0 7px var(--green); }
.led.err { background: var(--red);   box-shadow: 0 0 7px var(--red); }

/* Camera button */
#camBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
#camBtn:active { transform: scale(0.95); background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
#camBtn svg { width: 11px; height: 11px; flex-shrink: 0; }

/* ── MODE TOGGLE ── */
#modeToggle {
  width: 100%; flex-shrink: 0;
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 3px; position: relative;
}
#modeSlider {
  position: absolute; inset: 3px; width: calc(50% - 3px);
  background: var(--cyan); border-radius: 9px;
  box-shadow: 0 0 20px var(--cyan-glow);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1); pointer-events: none;
}
#modeSlider.pad { transform: translateX(100%); }
.mode-btn {
  position: relative; z-index: 1;
  padding: 9px 0; border: none; border-radius: 9px;
  background: transparent; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); transition: color 0.25s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.mode-btn.active { color: #000; }
.mode-btn svg { width: 13px; height: 13px; }

/* ═══════════════════════════════════════════════
   MAIN AREA — 16:9 landscape, lives inside #padZone
   ═══════════════════════════════════════════════ */
#mainArea {
  width: 100%;
  aspect-ratio: 16 / 9;
  max-height: 100%;
  position: relative; border-radius: var(--r);
  border: 1px solid var(--border); overflow: hidden;
  background: var(--pad-bg);
  transition: border-color 0.2s, box-shadow 0.2s, aspect-ratio 0.3s;
  align-self: center;
}
/* Touchpad mode: taller surface = more gesture room */
#mainArea.pad-active { aspect-ratio: 4 / 3; }

/* Pad state classes */
#mainArea.click-flash  { border-color: var(--cyan);  box-shadow: 0 0 0 2px var(--cyan-dim),   inset 0 0 28px var(--cyan-dim); }
#mainArea.dbl-flash    { border-color: #fff;          box-shadow: 0 0 0 2px rgba(255,255,255,0.12), inset 0 0 40px rgba(255,255,255,0.1); }
#mainArea.drag-active  { border-color: var(--amber);  animation: dragPulse 0.9s ease-in-out infinite; }
#mainArea.scroll-flash { border-color: var(--amber);  box-shadow: 0 0 0 2px var(--amber-dim); }
#mainArea.three-flash  { border-color: var(--green);  box-shadow: 0 0 0 2px var(--green-dim), inset 0 0 28px var(--green-dim); }
#mainArea.clutch-flash { border-color: var(--muted);  box-shadow: none; }

@keyframes dragPulse {
  0%,100% { box-shadow: 0 0 0 2px var(--amber-dim); }
  50%      { box-shadow: 0 0 0 4px rgba(245,158,11,0.3); }
}

/* ── AIR TRACKING PAD ── */
#airPad {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 28% 38%, rgba(0,212,255,0.06) 0%, transparent 65%);
  transition: opacity 0.3s;
}
.grid-dots {
  position: absolute; inset: 0; opacity: 0.1;
  background-image: radial-gradient(circle, var(--muted) 1px, transparent 1px);
  background-size: 20px 20px;
}

/* Air cursor — distinct visual states */
#airCursor {
  position: absolute; width: 26px; height: 26px;
  border: 2px solid var(--cyan); border-radius: 50%;
  background: var(--cyan-dim);
  transform: translate(-50%,-50%);
  pointer-events: none;
  box-shadow: 0 0 10px var(--cyan-glow);
  transition: border-color 0.1s, background 0.1s, box-shadow 0.1s, transform 0.1s;
}
#airCursor::before {
  content: ''; position: absolute; inset: -8px;
  border: 1px solid rgba(0,212,255,0.18); border-radius: 50%;
  transition: border-color 0.1s;
}

/* CLUTCH — frozen, grey ring */
#airCursor.state-clutch {
  border-color: var(--muted); background: rgba(100,116,139,0.08);
  box-shadow: none; transform: translate(-50%,-50%) scale(0.85);
}
#airCursor.state-clutch::before { border-color: rgba(100,116,139,0.1); }

/* LEFT_DOWN / DRAG — filled cyan + scale up */
#airCursor.state-down {
  border-color: var(--cyan); background: rgba(0,212,255,0.4);
  box-shadow: 0 0 20px var(--cyan-glow), 0 0 0 4px var(--cyan-dim);
  transform: translate(-50%,-50%) scale(1.15);
}

/* SCROLL — amber */
#airCursor.state-scroll {
  border-color: var(--amber); background: rgba(245,158,11,0.15);
  box-shadow: 0 0 12px rgba(245,158,11,0.35);
}
#airCursor.state-scroll::before { border-color: rgba(245,158,11,0.2); }

/* THREE-FINGER — green */
#airCursor.state-three {
  border-color: var(--green); background: var(--green-dim);
  box-shadow: 0 0 12px rgba(34,197,94,0.35);
}
#airCursor.state-three::before { border-color: rgba(34,197,94,0.2); }

/* Gesture label above cursor */
#airLabel {
  position: absolute;
  transform: translate(-50%, calc(-50% - 24px));
  font-family: var(--mono); font-size: 8px; color: var(--cyan);
  background: rgba(0,0,0,0.65); border: 1px solid var(--border);
  padding: 2px 7px; border-radius: 20px; white-space: nowrap;
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s;
}
#airLabel.show { opacity: 1; }

/* ── LAPTOP TOUCHPAD ── */
#touchPad { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.3s; }

#touchSurface {
  flex: 1; min-height: 0; position: relative; overflow: hidden; cursor: crosshair;
  background: linear-gradient(170deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.008) 40%, rgba(0,0,0,0.06) 100%), var(--pad-bg);
  border-bottom: 1px solid var(--border-hi);
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.35), inset 0 -1px 3px rgba(255,255,255,0.03);
}
#touchSurface::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.007) 2px, rgba(255,255,255,0.007) 3px);
}

#ghostDot {
  position: absolute; width: 7px; height: 7px;
  background: var(--cyan); border-radius: 50%;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px var(--cyan-glow); pointer-events: none;
  transition: left 0.04s linear, top 0.04s linear;
}
.fdot {
  position: absolute; width: 14px; height: 14px;
  border: 1.5px solid var(--cyan); border-radius: 50%;
  transform: translate(-50%,-50%); pointer-events: none;
  opacity: 0; background: var(--cyan-dim); transition: opacity 0.08s;
}
.corner { position: absolute; width: 14px; height: 14px; border-color: var(--border-hi); border-style: solid; }
.corner.tl { top:10px; left:10px;   border-width:1.5px 0 0 1.5px; border-radius:3px 0 0 0; }
.corner.tr { top:10px; right:10px;  border-width:1.5px 1.5px 0 0; border-radius:0 3px 0 0; }
.corner.bl { bottom:10px; left:10px;  border-width:0 0 1.5px 1.5px; border-radius:0 0 0 3px; }
.corner.br { bottom:10px; right:10px; border-width:0 1.5px 1.5px 0; border-radius:0 0 3px 0; }

#gestureBadge {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 9px; color: var(--cyan);
  background: rgba(0,0,0,0.55); border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 20px; letter-spacing: 0.1em;
  opacity: 0; pointer-events: none; transition: opacity 0.15s; white-space: nowrap;
}
#gestureBadge.show { opacity: 1; }

#dragBadge {
  position: absolute; top: 8px; right: 8px;
  font-family: var(--mono); font-size: 9px; color: var(--amber);
  background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.35);
  padding: 3px 8px; border-radius: 20px;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#dragBadge.show { opacity: 1; }

#padHint {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  pointer-events: none;
}
#padHint span { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.08em; line-height: 2; }
#padHint.gone { opacity: 0; transition: opacity 0.4s; }

#clickButtons {
  height: 75px; flex-shrink: 0; display: flex;
  background: var(--btn-bg);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4), inset 0 -1px 2px rgba(255,255,255,0.02);
}
.click-btn {
  flex: 1; border: none; background: transparent;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.12s, color 0.12s; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.click-btn:active, .click-btn.pressed { background: var(--cyan-dim); color: var(--cyan); }
#rightBtn { border-left: 1px solid var(--border); }
.click-btn svg { width: 16px; height: 16px; }

.ripple {
  position: absolute; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.45), transparent 70%);
  transform: translate(-50%,-50%) scale(0);
  animation: ripOut 0.5s ease-out forwards; pointer-events: none;
}
@keyframes ripOut { to { transform: translate(-50%,-50%) scale(7); opacity: 0; } }

.hidden { opacity: 0 !important; pointer-events: none !important; }

/* ═══════════════════════════════════════════════
   STATUS BAR
   ═══════════════════════════════════════════════ */
#statusBar {
  width: 100%; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 13px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-family: var(--mono); font-size: 10px; color: var(--cyan);
  letter-spacing: 0.06em; transition: all 0.2s; overflow: hidden;
}
.blink { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; animation: blinkAnim 1.4s ease-in-out infinite; }
@keyframes blinkAnim { 0%,100%{opacity:1}50%{opacity:0.15} }
#statusText { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#statusBar.alert { background: var(--cyan-dim); border-color: var(--cyan); }
#statusBar.alert .blink { animation: none; }

/* State-tinted status */
#statusBar.state-clutch { background: rgba(100,116,139,0.12); border-color: var(--muted); color: var(--muted2); }
#statusBar.state-down   { background: var(--cyan-dim); border-color: var(--cyan); }
#statusBar.state-scroll { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
#statusBar.state-three  { background: var(--green-dim); border-color: var(--green); color: var(--green); }

/* ═══════════════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════════════ */
#controls {
  width: 100%; flex-shrink: 0;
  background: var(--chassis); border: 1px solid var(--border);
  border-radius: var(--r); padding: 11px 13px;
  display: flex; flex-direction: column; gap: 9px;
}
.ctrl-row { display:flex; align-items:center; gap:10px; }
.ctrl-label { font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); white-space: nowrap; }
.ctrl-val   { font-family: var(--mono); font-size: 10px; color: var(--cyan); white-space: nowrap; }

input[type="range"] { flex:1; -webkit-appearance:none; background:transparent; height:16px; }
input[type="range"]::-webkit-slider-runnable-track {
  height: 3px;
  background: linear-gradient(to right, var(--cyan) var(--pct,30%), rgba(255,255,255,0.08) var(--pct,30%));
  border-radius: 10px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width:16px; height:16px; border-radius:50%;
  background: var(--cyan); margin-top:-6.5px;
  box-shadow: 0 0 8px var(--cyan-glow); border: 2px solid var(--bg);
}

.btn-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.action-btn {
  padding: 10px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface); color: var(--muted2);
  cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.on  { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
.action-btn.sys { background: rgba(34,197,94,0.1); border-color: var(--green); color: var(--green); }
.action-btn svg { width: 12px; height: 12px; }

video { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- ① TOP BAR -->
  <div id="topbar">
    <div id="logo">AEROOS</div>
    <div class="topbar-right">
      <button id="camBtn" onclick="cycleCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span id="camLabel">FRONT</span>
      </button>
      <div id="wsLed">
        <div class="led" id="wsDot"></div>
        <span id="wsLabel">OFFLINE</span>
      </div>
    </div>
  </div>

  <!-- ② MODE TOGGLE -->
  <div id="modeToggle">
    <div id="modeSlider"></div>
    <button class="mode-btn active" id="btnAir" onclick="setMode('air')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      Air Track
    </button>
    <button class="mode-btn" id="btnPad" onclick="setMode('pad')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <line x1="2" y1="15" x2="22" y2="15"/>
        <line x1="12" y1="15" x2="12" y2="20"/>
      </svg>
      Touchpad
    </button>
  </div>

  <!-- ③ PAD ZONE -->
  <div id="padZone">
    <div id="mainArea">

      <!-- AIR PAD -->
      <div id="airPad">
        <div class="grid-dots"></div>
        <div id="airCursor"></div>
        <div id="airLabel"></div>
      </div>

      <!-- LAPTOP TOUCHPAD -->
      <div id="touchPad" class="hidden">
        <div id="touchSurface">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div id="ghostDot"></div>
          <div class="fdot" id="fd0"></div>
          <div class="fdot" id="fd1"></div>
          <div class="fdot" id="fd2"></div>
          <div id="padHint">
            <span>SLIDE ↔ MOVE  ·  TAP = CLICK  ·  HOLD = DRAG</span>
            <span>✌ TWO: SCROLL / PINCH ZOOM / RIGHT CLICK</span>
            <span>☰ THREE: TASK VIEW / SHOW DESKTOP</span>
          </div>
          <div id="gestureBadge"></div>
          <div id="dragBadge">✥ DRAG ACTIVE</div>
        </div>
        <div id="clickButtons">
          <button class="click-btn" id="leftBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="4"/><path d="M3 10h8V3"/>
            </svg>
            Left Click
          </button>
          <button class="click-btn" id="rightBtn">
            Right Click
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="4"/><path d="M21 10h-8V3"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ④ STATUS BAR -->
  <div id="statusBar">
    <div class="blink"></div>
    <div id="statusText">SYSTEM STANDBY</div>
  </div>

  <!-- ⑤ CONTROLS -->
  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="sensSlider" min="10" max="40" value="15">
      <span class="ctrl-val" id="sensVal">1.5×</span>
    </div>
    <div class="btn-row">
      <button class="action-btn sys" id="btnSys" onclick="toggleSystem()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        System On
      </button>
      <button class="action-btn" id="btnFlash" onclick="toggleFlash()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 2H9l-1 7h4l-2 13 9-11h-5l1-9z"/>
        </svg>
        Screen Light
      </button>
      <button class="action-btn" id="btnKeyboard" onclick="toggleKeyboard()">

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

// ═══════════════════════════════════════════════
// 1€ FILTER
// ═══════════════════════════════════════════════
class OneEuroFilter {
  constructor(mc=1.2, b=0.5, dc=1.0) { this.mc=mc; this.b=b; this.dc=dc; this._x=null; this._dx=0; }
  _a(c) { const r=2*Math.PI*c/30; return r/(r+1); }
  filter(v) {
    if (this._x===null) { this._x=v; return v; }
    const rdx=v-this._x;
    this._dx += (rdx-this._dx)*this._a(this.dc);
    this._x  += (v-this._x)*this._a(this.mc+this.b*Math.abs(this._dx));
    return this._x;
  }
  reset(v) { this._x=v; this._dx=0; }
}

// Applied to Landmark 9 exclusively for cursor movement.
// minCutoff 0.1 = extreme low-speed stabilization; beta 0.8 = responsive at speed.
const fX = new OneEuroFilter(0.1, 0.8);
const fY = new OneEuroFilter(0.1, 0.8);

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const NGROK         = "vigorously-heterochthonous-mitch.ngrok-free.dev";
const EDGE          = 0.12;   // camera dead-zone remap
const PINCH_THRESH  = 0.10;   // wider threshold for mobile wide-FOV cameras
const SCROLL_THRESH = 0.035;  // filtered delta deadzone — prevents jitter
const SWIPE_THRESH  = 0.055;  // filtered Y delta to fire a 3-finger swipe
const SEND_THRESH   = 0.0018; // WS position delta gate
const BASE_SPEED    = 2.4;    // global relative-move multiplier

// Clutch state-machine thresholds
// FOLD_THRESH: fingertip-to-wrist / palmSize < this → finger is folded.
//   palmSize = dist(wrist, middle-MCP) self-normalizes for camera depth.
//   Extended tip ≈ 2.0×palm; folded tip ≈ 0.8–1.0×palm → 1.3 splits them cleanly.
const FOLD_THRESH  = 1.3;
const FIST_ENGAGE  = 2;   // consecutive fist frames to lock clutch
const FIST_RELEASE = 2;   // consecutive open frames to release clutch
const CLUTCH_COOL  = 6;  // cooldown frames after release (absorbs unfurl wobble)

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let curX=0.5, curY=0.5;
let lastSX=-1, lastSY=-1;
let isActive=true, isFlash=false;
let currentMode='air';
let handLandmarker=null;
let statusTimer=0;

// Camera
let cameras=[], camIdx=0;

// Air gesture state
let isPinched      = false;
let pinchStartTime = 0;
let isDragging     = false;
let rightClickCd   = 0;
let scrollRefY     = null;
let scrollRefX     = null;
let swipeRefY      = null;
let swipeFired     = false;
let airLabelTimer  = null;
let clutchCooldown = 0;
let activeGesture  = 'none';
let poseHoldFrames = 0;
let airLastTap     = 0;

// Relative tracking anchors.
// null = "no previous frame" — primed fresh when hand re-enters frame.
let lastHandX = null;
let lastHandY = null;

// Clutch state machine
let clutchActive   = false; // hard lock: cursor completely frozen
let fistFrames     = 0;     // consecutive frames isFistRaw was true
let openFrames     = 0;     // consecutive frames isFistRaw was false

// ═══════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════
const airCursor   = document.getElementById('airCursor');
const airLabel    = document.getElementById('airLabel');
const airPad      = document.getElementById('airPad');
const touchPad    = document.getElementById('touchPad');
const touchSurface= document.getElementById('touchSurface');
const ghostDot    = document.getElementById('ghostDot');
const mainArea    = document.getElementById('mainArea');
const statusBar   = document.getElementById('statusBar');
const statusText  = document.getElementById('statusText');
const sensSlider  = document.getElementById('sensSlider');
const sensVal     = document.getElementById('sensVal');
const wsDot       = document.getElementById('wsDot');
const wsLabel     = document.getElementById('wsLabel');
const padHint     = document.getElementById('padHint');
const gestureBadge= document.getElementById('gestureBadge');
const dragBadge   = document.getElementById('dragBadge');
const fingerDots  = [0,1,2].map(i=>document.getElementById(`fd${i}`));
const video       = document.getElementById('webcam');

sensSlider.addEventListener('input', () => {
  sensSlider.style.setProperty('--pct', ((sensSlider.value-10)/30*100).toFixed(0)+'%');
  sensVal.textContent = (sensSlider.value/10).toFixed(1)+'×';
});
sensSlider.dispatchEvent(new Event('input'));

// ═══════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════
const socket = new WebSocket(`wss://${NGROK}`);
socket.onopen  = () => { wsDot.className='led on';  wsLabel.textContent='LINKED'; };
socket.onclose = () => { wsDot.className='led err'; wsLabel.textContent='OFFLINE'; };
socket.onerror = () => { wsDot.className='led err'; wsLabel.textContent='ERROR'; };
const wsSend = msg => { if (socket.readyState===WebSocket.OPEN) socket.send(msg); };

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function alert2(msg, stateClass='alert') {
  statusText.textContent = msg;
  statusBar.className = stateClass;
  statusTimer = 90;
}
function resetHUD() {
  statusBar.className = '';
  statusText.textContent = currentMode==='air' ? 'AIR TRACK · LM9 ACTIVE' : 'TOUCHPAD · ACTIVE';
}

let badgeTimer = null;
function showBadge(msg) {
  gestureBadge.textContent = msg;
  gestureBadge.classList.add('show');
  clearTimeout(badgeTimer);
  badgeTimer = setTimeout(()=>gestureBadge.classList.remove('show'), 1000);
}

function showAirLabel(msg) {
  airLabel.textContent = msg;
  airLabel.classList.add('show');
  clearTimeout(airLabelTimer);
  airLabelTimer = setTimeout(()=>airLabel.classList.remove('show'), 900);
}

// ═══════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════
window.setMode = m => {
  currentMode = m;
  document.getElementById('modeSlider').className = m==='pad'?'pad':'';
  document.getElementById('btnAir').classList.toggle('active', m==='air');
  document.getElementById('btnPad').classList.toggle('active', m==='pad');
  airPad.classList.toggle('hidden', m==='pad');
  touchPad.classList.toggle('hidden', m==='air');
  mainArea.classList.toggle('pad-active', m==='pad');
  resetHUD();
};

// ═══════════════════════════════════════════════
// SYSTEM / FLASH / KEYBOARD
// ═══════════════════════════════════════════════
window.toggleSystem = () => {
  isActive = !isActive;
  const b = document.getElementById('btnSys');
  b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>${isActive?' System On':' System Off'}`;
  b.className = isActive ? 'action-btn sys' : 'action-btn';
  alert2(isActive ? 'SYSTEM ONLINE' : 'SYSTEM OFFLINE');
};

window.toggleFlash = async () => {
  isFlash = !isFlash;
  document.getElementById('btnFlash').classList.toggle('on', isFlash);
  let usedTorch = false;
  if (video.srcObject) {
    try {
      const track = video.srcObject.getVideoTracks()[0];
      if (track && track.getCapabilities().torch) {
        await track.applyConstraints({ advanced: [{ torch: isFlash }] });
        usedTorch = true;
      }
    } catch(e) { /* torch unavailable — fall through */ }
  }
  if (!usedTorch) document.body.classList.toggle('flash-mode', isFlash);
  alert2(isFlash ? (usedTorch ? 'TORCH ON' : 'ILLUMINATION ON') : (usedTorch ? 'TORCH OFF' : 'ILLUMINATION OFF'));
};

window.toggleKeyboard = () => {
  wsSend('GEST:TOGGLE_KEYBOARD');
  alert2('KEYBOARD TOGGLED');
};

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
async function enumCameras() {
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    cameras = devs.filter(d=>d.kind==='videoinput').map(d=>({
      deviceId: d.deviceId, label: d.label||'Camera',
      facing: /front|user/i.test(d.label)?'front':'back',
      isUltra: /ultra|wide/i.test(d.label)
    }));
    cameras.sort((a,b) => a.facing==='front'?-1:1);
    updateCamBtn();
  } catch(e) {}
}
function camShortLabel(c) {
  if (!c||c.facing==='front') return 'FRONT';
  if (c.isUltra) return 'ULTRA';
  return 'BACK';
}
function updateCamBtn() { document.getElementById('camLabel').textContent = camShortLabel(cameras[camIdx]); }
window.cycleCamera = async () => {
  if (cameras.length<2) return;
  camIdx = (camIdx+1)%cameras.length;
  await startStream(cameras[camIdx].deviceId);
  updateCamBtn();
  alert2('CAMERA: '+camShortLabel(cameras[camIdx]));
};
async function startStream(deviceId=null, facingMode='user') {
  if (video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  try {
    const c = deviceId
      ? { video:{ deviceId:{exact:deviceId}, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:60,max:120} } }
      : { video:{ facingMode, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:60,max:120} } };
    video.srcObject = await navigator.mediaDevices.getUserMedia(c);
    await video.play();
  } catch(e) { alert2('CAMERA ERROR'); }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const remapEdge = v => Math.max(0, Math.min(1, (v-EDGE)/(1-2*EDGE)));
const fingerUp  = (lm,tip,dip) => lm[tip].y < lm[dip].y;

// Bug 4 fix: account for 4:3 camera aspect ratio — X coords are physically wider than Y.
// Multiplying dX by (4/3) makes the euclidean distance correct in physical space,
// so pinches work regardless of whether the hand is horizontal or vertical.
const dist2d = (a,b) => Math.hypot((a.x-b.x) * (4/3), a.y-b.y);

function sendPos(x, y, force=false) {
  if (force || Math.hypot(x-lastSX, y-lastSY) > SEND_THRESH) {
    wsSend(`${x.toFixed(3)},${y.toFixed(3)}`);
    lastSX=x; lastSY=y;
    ghostDot.style.left = `${x*100}%`;
    ghostDot.style.top  = `${y*100}%`;
  }
}

function setCursorState(state) {
  airCursor.className = state ? `state-${state}` : '';
}

function setMainState(state) {
  mainArea.className = state ? `${state}-flash` : '';
}

// ═══════════════════════════════════════════════
// aiLoop() — V8.1 Clutch Redesign
//
// Three clutch fixes:
//   Symptom 1 (Flaky Detection):  palm-ratio fist check (depth-invariant) +
//                                  hysteresis counters (engage=4, release=3 frames)
//   Symptom 2 (Teleportation):    1€ filters reset to null on hand exit so
//                                  filter-lerp deltas never accumulate into curX/Y
//   Symptom 3 (Unfurl Wobble):    cursor frozen during BOTH clutch AND cooldown;
//                                  lastHandX/Y updates freely so the anchor drains
//                                  the unfurl motion silently, giving zero delta
//                                  on the first real tracking frame
// ═══════════════════════════════════════════════
function aiLoop(lm) {

  // ── A: Filter LM9 every frame ─────────────────────────────────────────────
  // This is the ONLY source of truth for both movement and scroll deltas.
  const rawX      = remapEdge(1 - lm[9].x);
  const rawY      = remapEdge(lm[9].y);
  const smoothHandX = fX.filter(rawX);
  const smoothHandY = fY.filter(rawY);

  // ── B: Relative delta ─────────────────────────────────────────────────────
  // lastHandX is null on the very first frame after any hand absence,
  // so dx/dy = 0 on re-entry — no cursor jump no matter where the hand appears.
  let dx = 0, dy = 0;
  if (lastHandX !== null) {
    dx = smoothHandX - lastHandX;
    dy = smoothHandY - lastHandY;
  }
  // Advance anchor unconditionally — this includes clutch and cooldown frames,
  // which is intentional: the anchor silently absorbs motion we don't want to
  // act on, so the next "live" frame inherits a zero delta.
  lastHandX = smoothHandX;
  lastHandY = smoothHandY;

  // ── C: FIST DETECTION — normalized palm-ratio, depth-invariant ────────────
  //
  // palmSize = dist(wrist → middle-MCP).  Because both landmarks are on the
  // same hand, this scales with camera distance, making the threshold
  // self-normalizing for depth AND wrist rotation.
  //
  //   Extended fingertip-to-wrist ≈ 2.0 × palmSize
  //   Folded   fingertip-to-wrist ≈ 0.8–1.0 × palmSize
  //   FOLD_THRESH = 1.3 → clean split with a safety margin on both sides
  //
  const palmSize  = dist2d(lm[0], lm[9]);
  const isFistRaw =
    dist2d(lm[8],  lm[0]) < palmSize * FOLD_THRESH &&  // index folded
    dist2d(lm[12], lm[0]) < palmSize * FOLD_THRESH &&  // middle folded
    dist2d(lm[16], lm[0]) < palmSize * FOLD_THRESH &&  // ring folded
    dist2d(lm[20], lm[0]) < palmSize * FOLD_THRESH;    // pinky folded

    // ── D: CLUTCH STATE MACHINE with hysteresis ───────────────────────────────
  if (isFistRaw) {
    fistFrames++;
    openFrames = 0;

    if (!clutchActive && fistFrames >= FIST_ENGAGE) {
      clutchActive   = true;
      clutchCooldown = 0;

      if (isDragging)  { wsSend('GEST:LEFT_UP'); isDragging = false; }
      isPinched = false;
      scrollRefX = null; scrollRefY = null;
      swipeRefY  = null; swipeFired = false;
      activeGesture = 'none'; poseHoldFrames = 0;

      setCursorState('clutch');
      setMainState('clutch');
      alert2('✊ CLUTCH · CURSOR FROZEN', 'state-clutch');
    }
  } else {
    openFrames++;
    fistFrames = 0;

    if (clutchActive && openFrames >= FIST_RELEASE) {
      clutchActive   = false;
      clutchCooldown = CLUTCH_COOL;
      openFrames     = 0;
    }
  }

  // ── E: HARD FREEZE & FILTER RESET ─────────────────────────────────────────
  // CRITICAL FIX 1: Add `isFistRaw` to the block list. This pre-emptively freezes 
  // the cursor instantly while you squeeze, preventing the "Squeeze Jump".
  if (clutchActive || clutchCooldown > 0 || isFistRaw) {
    
    if (clutchCooldown > 0) {
      clutchCooldown--;
      
      // CRITICAL FIX 2: The exact frame the cooldown ends, the unfurl is complete.
      // We forcefully wipe the 1Euro filter's memory so it doesn't "whip" the cursor.
      if (clutchCooldown === 0) {
        fX.reset(rawX);
        fY.reset(rawY);
        lastHandX = rawX;
        lastHandY = rawY;
      }
    }

    airCursor.style.left = `${curX*100}%`;
    airCursor.style.top  = `${curY*100}%`;
    airLabel.style.left  = `${curX*100}%`;
    airLabel.style.top   = `${curY*100}%`;
    return;
  }

  // ── F: TRACKING MODE — apply relative delta ───────────────────────────────
  const sens = (sensSlider.value / 10) * BASE_SPEED;
  curX = Math.max(0, Math.min(1, curX + dx * sens));
  curY = Math.max(0, Math.min(1, curY + dy * sens));

  airCursor.style.left = `${curX*100}%`;
  airCursor.style.top  = `${curY*100}%`;
  airLabel.style.left  = `${curX*100}%`;
  airLabel.style.top   = `${curY*100}%`;
  sendPos(curX, curY);


  // ── G: Finger state flags ──────────────────────────────────────────────────
  const iU = fingerUp(lm,8,6),  mU = fingerUp(lm,12,10);
  const rU = fingerUp(lm,16,14), pU = fingerUp(lm,20,18);

  // ── H: INDEX PINCH → click / drag ─────────────────────────────────────────
  const indexPinch = dist2d(lm[8], lm[4]) < PINCH_THRESH;

  if (indexPinch && !isPinched) {
    isPinched      = true;
    pinchStartTime = Date.now();
    isDragging     = false;
    setCursorState('down');
    setMainState('click');
  } else if (indexPinch && isPinched && !isDragging) {
    if (Date.now() - pinchStartTime >= 250) {
      isDragging = true;
      wsSend('GEST:LEFT_DOWN');
      showAirLabel('DRAG');
      alert2('☝ DRAG ACTIVE', 'state-down');
    }
  } else if (!indexPinch && isPinched) {
    if (isDragging) {
      wsSend('GEST:LEFT_UP');
      showAirLabel('DROP');
      alert2('AIR TRACK · LM9 ACTIVE');
      isDragging = false;
    } else {
      // Fast tap — JS double-click detection
      const now = Date.now();
      if (now - airLastTap < 400) {
        wsSend('GEST:DOUBLE_CLICK');
        showAirLabel('DOUBLE CLICK');
        setMainState('dbl');
        airLastTap = 0;
      } else {
        wsSend('GEST:CLICK');
        showAirLabel('CLICK');
        setMainState('click');
        airLastTap = now;
      }
      setTimeout(() => setMainState(''), 180);
      alert2('CLICK');
    }
    isPinched = false;
    setCursorState('');
    if (!isDragging) setMainState('');
  }

  if (isPinched) return;

  // ── I: MIDDLE PINCH → RIGHT_CLICK ─────────────────────────────────────────
  const middlePinch = dist2d(lm[12], lm[4]) < PINCH_THRESH;
  // Only decrement when pinch is open — prevents re-fire while held
  if (!middlePinch && rightClickCd > 0) rightClickCd--;
  if (middlePinch && rightClickCd === 0) {
    wsSend('GEST:RIGHT_CLICK');
    showAirLabel('RIGHT CLICK');
    setMainState('click');
    setTimeout(() => setMainState(''), 200);
    alert2('✌ RIGHT CLICK', 'alert');
    rightClickCd = 40;
  }

  // ── J: SCROLL / THREE-FINGER — strict state machine ───────────────────────
  const rawScroll = iU && mU && !rU && !pU && !middlePinch;
  const rawThree  = iU && mU && rU && !pU;

  if (rawScroll || rawThree) {
    poseHoldFrames++;
  } else {
    poseHoldFrames = 0;
    activeGesture  = 'none';
    scrollRefX = null; scrollRefY = null;
    swipeRefY  = null; swipeFired = false;
  }

  if (poseHoldFrames > 4 && activeGesture === 'none') {
    activeGesture = rawScroll ? 'scroll' : 'three';
  }

  if (activeGesture === 'scroll') {
    setCursorState('scroll');
    setMainState('scroll');
    if (scrollRefY === null) { scrollRefY = smoothHandY; scrollRefX = smoothHandX; }

    const sdY = smoothHandY - scrollRefY;
    const sdX = smoothHandX - scrollRefX;

    if (Math.max(Math.abs(sdY), Math.abs(sdX)) > SCROLL_THRESH) {
      let g, label;
      if (Math.abs(sdY) >= Math.abs(sdX)) {
        // Natural scroll: hand up → content up → SCROLL_DOWN payload
        g     = sdY < 0 ? 'GEST:SCROLL_DOWN'  : 'GEST:SCROLL_UP';
        label = sdY < 0 ? '⬆ SCROLL UP'       : '⬇ SCROLL DOWN';
      } else {
        // Natural scroll: hand left → SCROLL_RIGHT payload
        g     = sdX < 0 ? 'GEST:SCROLL_RIGHT'  : 'GEST:SCROLL_LEFT';
        label = sdX < 0 ? '▶ SCROLL RIGHT'     : '◀ SCROLL LEFT';
      }
      wsSend(g);
      showAirLabel(label);
      statusText.textContent = label;
      statusBar.className = 'state-scroll';
      scrollRefY = smoothHandY;
      scrollRefX = smoothHandX;
    }

  } else if (activeGesture === 'three') {
    setCursorState('three');
    setMainState('three');
    if (swipeRefY === null) { swipeRefY = smoothHandY; swipeFired = false; }
    const sdY = smoothHandY - swipeRefY;
    if (!swipeFired && Math.abs(sdY) > SWIPE_THRESH) {
      const g     = sdY < 0 ? 'GEST:TASK_VIEW'  : 'GEST:SHOW_DESKTOP';
      const label = sdY < 0 ? '⬆ TASK VIEW'     : '⬇ SHOW DESKTOP';
      wsSend(g);
      showAirLabel(label);
      alert2(label, 'state-three');
      swipeFired = true;
    }
  } else if (!middlePinch) {
    setCursorState('');
    if (statusTimer === 0) setMainState('');
  }
}

// ═══════════════════════════════════════════════
// TOUCHPAD GESTURE ENGINE
// ═══════════════════════════════════════════════
const tpState = new Map();
let tpMode='idle', tpLastTap=0;
let tpDragActive=false, tpDragTimer=null;
let tpPinchDist=0, tpScrollThr=0, tpZoomThr=0;
let tpScrollRefY=0, tpScrollRefX=0;
let tp3RefY=0, tp3RefX=0;
const tpArr = () => [...tpState.values()];

function tpEndDrag() {
  clearTimeout(tpDragTimer);
  if (tpDragActive) {
    wsSend('GEST:DROP'); alert2('DROPPED');
    tpDragActive=false;
    mainArea.classList.remove('drag-active');
    dragBadge.classList.remove('show');
  }
}

touchSurface.addEventListener('touchstart', e=>{
  e.preventDefault(); padHint.classList.add('gone');
  [...e.changedTouches].forEach(t=>{
    tpState.set(t.identifier, {origX:t.clientX,origY:t.clientY,prevX:t.clientX,prevY:t.clientY,curX:t.clientX,curY:t.clientY,startTime:Date.now()});
  });
  const n=tpState.size, ts=tpArr();
  if (n===1) {
    tpMode='move';
    // Tap-and-a-half drag: if a second touch arrives within 400ms of a tap, start drag instantly
    if (Date.now() - tpLastTap < 400) {
      tpLastTap = 0;
      tpDragActive = true;
      wsSend('GEST:DRAG_START');
      sendPos(curX, curY, true);
      alert2('DRAG MODE · RELEASE TO DROP');
      mainArea.classList.add('drag-active');
      dragBadge.classList.add('show');
    } else {
      // Fallback: 600ms long-press drag trigger
      tpDragTimer = setTimeout(()=>{
        if (tpState.size===1&&ts.length&&Math.hypot(ts[0].curX-ts[0].origX,ts[0].curY-ts[0].origY)<14) {
          tpDragActive=true; wsSend('GEST:DRAG_START'); sendPos(curX,curY,true);
          alert2('DRAG MODE · RELEASE TO DROP'); mainArea.classList.add('drag-active'); dragBadge.classList.add('show');
        }
      },600);
    }
  } else if (n===2) {
    clearTimeout(tpDragTimer); tpMode='two';
    tpPinchDist=Math.hypot(ts[0].curX-ts[1].curX,ts[0].curY-ts[1].curY);
    tpScrollRefY=(ts[0].curY+ts[1].curY)/2; tpScrollRefX=(ts[0].curX+ts[1].curX)/2;
    tpScrollThr=0; tpZoomThr=0;
  } else if (n===3) {
    clearTimeout(tpDragTimer); tpMode='three';
    tp3RefY=ts.reduce((s,t)=>s+t.curY,0)/3; tp3RefX=ts.reduce((s,t)=>s+t.curX,0)/3;
  }
  updateFingerDots();
},{passive:false});

touchSurface.addEventListener('touchmove', e=>{
  e.preventDefault();
  [...e.changedTouches].forEach(t=>{
    const s=tpState.get(t.identifier);
    if (s){s.prevX=s.curX;s.prevY=s.curY;s.curX=t.clientX;s.curY=t.clientY;}
  });
  updateFingerDots();
  const n=tpState.size, ts=tpArr();
  if (n===1&&tpMode==='move') {
    const t=ts[0], dx=t.curX-t.prevX, dy=t.curY-t.prevY;
    if (!tpDragActive&&Math.hypot(t.curX-t.origX,t.curY-t.origY)>14) clearTimeout(tpDragTimer);
    const spd=Math.hypot(dx,dy), acc=spd<4?0.003:spd<12?0.0048:0.0072;
    curX=Math.max(0,Math.min(1,curX+dx*acc)); curY=Math.max(0,Math.min(1,curY+dy*acc));
    sendPos(curX,curY);
  } else if (n===2) {
    const d=Math.hypot(ts[0].curX-ts[1].curX,ts[0].curY-ts[1].curY);
    const midY=(ts[0].curY+ts[1].curY)/2, midX=(ts[0].curX+ts[1].curX)/2;
    const dd=d-tpPinchDist, sdY=midY-tpScrollRefY, sdX=midX-tpScrollRefX;
    if (tpZoomThr>0)tpZoomThr--; if(tpScrollThr>0)tpScrollThr--;
    if (Math.abs(dd)>9&&tpZoomThr===0) {
      const g=dd>0?'ZOOM_IN':'ZOOM_OUT'; wsSend(`GEST:${g}`);
      showBadge(dd>0?'🔍 ZOOM IN':'🔍 ZOOM OUT'); tpZoomThr=7; tpScrollRefY=midY; tpScrollRefX=midX;
    } else if (Math.abs(sdY)>6&&tpScrollThr===0&&Math.abs(dd)<5) {
      // Natural scroll: finger moves up → content scrolls up → SCROLL_DOWN payload
      const g=sdY<0?'SCROLL_DOWN':'SCROLL_UP'; wsSend(`GEST:${g}`);
      showBadge(sdY<0?'⬆ SCROLL UP':'⬇ SCROLL DOWN'); tpScrollThr=4; tpScrollRefY=midY;
    } else if (Math.abs(sdX)>10&&tpScrollThr===0&&Math.abs(dd)<5) {
      // Natural scroll: finger moves left → SCROLL_RIGHT payload
      const g=sdX<0?'SCROLL_RIGHT':'SCROLL_LEFT'; wsSend(`GEST:${g}`);
      showBadge(sdX<0?'▶ SCROLL RIGHT':'◀ SCROLL LEFT'); tpScrollThr=6; tpScrollRefX=midX;
    }
    tpPinchDist=d;
  }
},{passive:false});

touchSurface.addEventListener('touchend', e=>{
  e.preventDefault();
  [...e.changedTouches].forEach(ct=>{
    const touch=tpState.get(ct.identifier), countBefore=tpState.size;
    if (!touch){tpState.delete(ct.identifier);return;}
    const elapsed=Date.now()-touch.startTime, moved=Math.hypot(ct.clientX-touch.origX,ct.clientY-touch.origY);
    const rect=touchSurface.getBoundingClientRect(), rx=ct.clientX-rect.left, ry=ct.clientY-rect.top;
    if (countBefore===1&&tpMode==='move') {
      clearTimeout(tpDragTimer);
      if (tpDragActive) { tpEndDrag(); }
      else if (elapsed<230&&moved<13) {
        spawnRipple(touchSurface,rx,ry);
        const now=Date.now();
        if (now-tpLastTap<380) {
          wsSend('GEST:DOUBLE_CLICK'); alert2('DOUBLE CLICK');
          mainArea.classList.add('dbl-flash'); setTimeout(()=>mainArea.classList.remove('dbl-flash'),300); tpLastTap=0;
        } else {
          wsSend('GEST:CLICK'); alert2('LEFT CLICK');
          mainArea.classList.add('click-flash'); setTimeout(()=>mainArea.classList.remove('click-flash'),200); tpLastTap=now;
        }
      }
    } else if (countBefore===2&&tpMode==='two') {
      if (elapsed<210&&moved<13) { wsSend('GEST:RIGHT_CLICK'); alert2('RIGHT CLICK'); spawnRipple(touchSurface,rx,ry); }
    } else if (countBefore===3&&tpMode==='three') {
      const ts=tpArr(), avgY=ts.reduce((s,t)=>s+t.curY,0)/ts.length, avgX=ts.reduce((s,t)=>s+t.curX,0)/ts.length;
      const dy=avgY-tp3RefY, dx=avgX-tp3RefX;
      if (Math.abs(dy)>22||Math.abs(dx)>22) {
        let g; if (Math.abs(dy)>=Math.abs(dx)) g=dy<0?'TASK_VIEW':'SHOW_DESKTOP'; else g=dx<0?'NEXT_WINDOW':'PREV_WINDOW';
        wsSend(`GEST:${g}`); alert2(g.replace(/_/g,' '));
        showBadge(g==='TASK_VIEW'?'⬆ TASK VIEW':g==='SHOW_DESKTOP'?'⬇ SHOW DESKTOP':g==='NEXT_WINDOW'?'▶ NEXT WIN':'◀ PREV WIN');
      }
    }
    tpState.delete(ct.identifier);
  });
  updateFingerDots(); if(tpState.size===0)tpMode='idle';
},{passive:false});

touchSurface.addEventListener('touchcancel', e=>{
  e.preventDefault(); [...e.changedTouches].forEach(t=>tpState.delete(t.identifier));
  clearTimeout(tpDragTimer); if(tpDragActive)tpEndDrag();
  updateFingerDots(); tpMode='idle';
},{passive:false});

function bindClickBtn(id,g,label) {
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{
    e.preventDefault(); btn.classList.add('pressed'); wsSend(`GEST:${g}`); alert2(label);
    mainArea.classList.add('click-flash'); setTimeout(()=>mainArea.classList.remove('click-flash'),200);
  },{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();btn.classList.remove('pressed');},{passive:false});
}
bindClickBtn('leftBtn','CLICK','LEFT CLICK');
bindClickBtn('rightBtn','RIGHT_CLICK','RIGHT CLICK');

function spawnRipple(el,x,y) {
  const r=document.createElement('div'); r.className='ripple'; r.style.left=x+'px'; r.style.top=y+'px';
  el.appendChild(r); r.addEventListener('animationend',()=>r.remove());
}
function updateFingerDots() {
  const ts=[...tpState.values()], rect=touchSurface.getBoundingClientRect();
  fingerDots.forEach((d,i)=>{
    if(i<ts.length){d.style.left=`${ts[i].curX-rect.left}px`;d.style.top=`${ts[i].curY-rect.top}px`;d.style.opacity='1';}
    else d.style.opacity='0';
  });
}

// ═══════════════════════════════════════════════
// BOOT + LOOP
// ═══════════════════════════════════════════════
async function boot() {
  try {
    alert2('BOOTING NPU…');
    const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
    handLandmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:`https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
        delegate:'CPU'
      },
      runningMode:'VIDEO', numHands:1
    });
    await startStream(null,'user');
    await enumCameras();
    alert2('AIR TRACK · LM9 ACTIVE');
    loop();
  } catch(err) {
    alert2('BOOT FAILED — CHECK CAMERA');
    console.error(err);
  }
}

async function loop() {
  if (currentMode==='air' && isActive && video.readyState>=2 && handLandmarker) {
    const res=await handLandmarker.detectForVideo(video, performance.now());
    if (statusTimer>0 && --statusTimer===0) resetHUD();
    if (res.landmarks?.[0]) {
      aiLoop(res.landmarks[0]);
    } else {
      // Hand left the frame.
      // ① Null the relative-tracking anchors so re-entry has zero delta.
      // ② Reset the 1€ filter internal state to null — critical: without this
      //    the filter lerps from its stale position to the new one on re-entry,
      //    and every lerp-frame delta accumulates into the cursor as teleportation.
      // ③ Reset fist/open counters so clutch detection starts fresh.
      lastHandX = null;
      lastHandY = null;
      fX.reset(null);
      fY.reset(null);
      fistFrames = 0;
      openFrames = 0;
    }
  } else {
    if (statusTimer>0 && --statusTimer===0) resetHUD();
  }
  requestAnimationFrame(loop);
}

boot();
